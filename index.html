<html lang="zh-TW">
<head>

<title>超艋無差別減脂大賽</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Caveat:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #1a1a2e;
  --darker: #0f0f1e;
  --orange: #ff7c2a;
  --orange-glow: #ff9a5a;
  --blue: #00b4d8;
  --blue-glow: #5fdfff;
  --pink: #ff3d9a;
  --gold: #ffd166;
}
* { -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: 'Noto Sans TC', system-ui, sans-serif;
  background: var(--darker);
  color: #fff;
  overflow-x: hidden;
}
.font-display { font-family: 'Bangers', 'Noto Sans TC', sans-serif; letter-spacing: 2px; }
.font-handwrite { font-family: 'Caveat', 'Noto Sans TC', cursive; }

/* Cyberpunk background pattern */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,124,42,0.08) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0,180,216,0.08) 0%, transparent 40%),
    repeating-linear-gradient(45deg, transparent 0, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
  pointer-events: none;
  z-index: 0;
}

/* Dumbbell + arm decorations */
.deco-dumbbell, .deco-arm {
  position: fixed; opacity: 0.04; pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}

.btn-primary {
  background: linear-gradient(135deg, var(--orange), var(--pink));
  color: #fff; font-weight: 900; letter-spacing: 2px;
  padding: 14px 24px; border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 20px rgba(255,124,42,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.btn-primary:active { transform: scale(0.96); }

.btn-cyber {
  background: linear-gradient(135deg, var(--blue), #0066ff);
  color: #fff; font-weight: 900;
  padding: 12px 20px; border-radius: 12px;
  border: 2px solid var(--blue-glow);
  box-shadow: 0 0 20px rgba(0,180,216,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
  cursor: pointer; transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.btn-cyber:active { transform: scale(0.96); }

.card-cyber {
  background: linear-gradient(135deg, rgba(26,26,46,0.95), rgba(15,15,30,0.95));
  border: 2px solid rgba(0,180,216,0.3);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
  padding: 16px;
  position: relative;
  overflow: hidden;
}
.card-cyber::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--orange), var(--blue), transparent);
}

.card-orange {
  background: linear-gradient(135deg, rgba(255,124,42,0.15), rgba(255,61,154,0.1));
  border: 2px solid rgba(255,124,42,0.4);
  border-radius: 16px;
  padding: 16px;
}

.input-cyber {
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(0,180,216,0.4);
  color: #fff;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 16px;
  outline: none;
  width: 100%;
  font-family: inherit;
  transition: border 0.2s;
}
.input-cyber:focus { border-color: var(--orange); box-shadow: 0 0 12px rgba(255,124,42,0.3); }
.input-cyber::placeholder { color: rgba(255,255,255,0.4); }

.glow-text { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor; }
.glow-orange { color: var(--orange); text-shadow: 0 0 12px var(--orange); }
.glow-blue { color: var(--blue); text-shadow: 0 0 12px var(--blue); }
.glow-gold { color: var(--gold); text-shadow: 0 0 12px var(--gold); }

/* Animations */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 10px var(--orange), 0 0 20px var(--orange); }
  50% { box-shadow: 0 0 25px var(--orange), 0 0 50px var(--orange); }
}
.pulse-glow { animation: pulse-glow 1.5s infinite; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.shake { animation: shake 0.4s; }

@keyframes badge-rotate {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.badge-celebrate { animation: badge-rotate 1.5s ease-in-out; }

@keyframes slide-up {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: slide-up 0.3s ease; }

/* Bottom nav */
.bottom-nav {
  position: sticky; bottom: 0;
  background: linear-gradient(180deg, rgba(15,15,30,0.95), rgba(15,15,30,1));
  border-top: 2px solid rgba(0,180,216,0.3);
  display: flex; justify-content: space-around;
  padding: 8px 0 12px;
  backdrop-filter: blur(8px);
  z-index: 50;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 10px;
  cursor: pointer;
  color: rgba(255,255,255,0.5);
  font-size: 11px; font-weight: 700;
  transition: color 0.2s;
  background: none; border: none;
  font-family: inherit;
}
.nav-item.active { color: var(--orange); text-shadow: 0 0 8px var(--orange); }
.nav-item .icon { font-size: 22px; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(135deg, var(--dark), var(--darker));
  border: 2px solid var(--orange);
  color: #fff; padding: 12px 20px; border-radius: 999px;
  z-index: 999; font-weight: 700;
  box-shadow: 0 4px 20px rgba(255,124,42,0.4);
  animation: slide-up 0.3s ease;
}
.toast.error { border-color: #ff3d3d; }
.toast.success { border-color: #4caf50; }

/* Avatar grid */
.avatar-cell {
  width: 56px; height: 56px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(0,180,216,0.3);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; cursor: pointer;
  transition: all 0.15s;
}
.avatar-cell.selected {
  border-color: var(--orange); box-shadow: 0 0 16px var(--orange);
  transform: scale(1.08);
}

/* Quiz options */
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(0,180,216,0.3);
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer; transition: all 0.2s;
  text-align: left; width: 100%;
  color: #fff; font-family: inherit;
  font-size: 15px;
}
.quiz-opt:hover { border-color: var(--blue); }
.quiz-opt.correct { background: rgba(76,175,80,0.2); border-color: #4caf50; }
.quiz-opt.wrong { background: rgba(255,61,61,0.2); border-color: #ff3d3d; }

/* Badge cell */
.badge-cell {
  aspect-ratio: 1;
  background: rgba(0,0,0,0.5);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; padding: 4px;
  position: relative;
  transition: all 0.2s;
}
.badge-cell.earned {
  background: linear-gradient(135deg, rgba(255,124,42,0.2), rgba(255,209,102,0.2));
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(255,209,102,0.4);
}
.badge-cell.today {
  animation: pulse-glow 1.2s infinite;
  border-color: var(--orange);
}
.badge-cell .day-num {
  position: absolute; top: 2px; left: 4px;
  font-size: 10px; font-weight: 900;
  opacity: 0.6;
  font-family: 'Bangers';
}

/* Progress bar */
.bar-track {
  background: rgba(0,0,0,0.5);
  border-radius: 999px;
  overflow: hidden;
  height: 10px;
  border: 1px solid rgba(0,180,216,0.3);
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--orange), var(--gold));
  box-shadow: 0 0 12px var(--orange);
  transition: width 0.5s;
}

/* Tabs */
.tab-row {
  display: flex; gap: 6px;
  background: rgba(0,0,0,0.4);
  padding: 4px;
  border-radius: 999px;
  border: 1px solid rgba(0,180,216,0.3);
}
.tab-btn {
  flex: 1; padding: 8px 12px; border-radius: 999px;
  border: none; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 700;
  background: transparent; color: rgba(255,255,255,0.6);
  transition: all 0.2s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--orange), var(--pink));
  color: #fff;
  box-shadow: 0 0 12px rgba(255,124,42,0.5);
}

/* Loading */
.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(0,180,216,0.2);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<svg class="deco-dumbbell" style="top:50px; right:-40px; width:200px;" viewBox="0 0 200 100" fill="#ff7c2a">
  <rect x="20" y="35" width="20" height="30" rx="4"/>
  <rect x="40" y="42" width="120" height="16" rx="2"/>
  <rect x="160" y="35" width="20" height="30" rx="4"/>
  <rect x="10" y="40" width="14" height="20" rx="2"/>
  <rect x="176" y="40" width="14" height="20" rx="2"/>
</svg>
<svg class="deco-arm" style="bottom:80px; left:-30px; width:180px;" viewBox="0 0 200 200" fill="#00b4d8">
  <path d="M30 100 Q60 60 100 80 Q140 100 130 140 Q120 170 80 165 Q40 160 30 130 Z"/>
  <circle cx="100" cy="80" r="20"/>
</svg>

<div id="app">
  <div style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
    <div class="spinner"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://wcemkmwrlvijxxwybrgs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjZW1rbXdybHZpanh4d3licmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzA1NDgsImV4cCI6MjA5MDcwNjU0OH0.Ji557wlvrS7YgflU9ANEm9To6AXLc47EFPaMHTgGARg';
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ============ STATE ============
const state = {
  user: null,
  page: 'login',
  config: null,
  bodyRecords: [],
  quizRecords: [],
  mealCheckins: [],
  badges: [],
  todayQuiz: null,
  loginStep: 'phone', // phone, register, login
  registerData: {},
  rankTab: 'fat',
  recordTab: 'chart',
  quizState: null, // { day, options, selected, answered, correct }
};

const AVATARS = ['💪','🏃','🥗','🔥','⚡','🌟','🦁','🎯'];
const BADGE_NAMES = [
  ['啟程鬥士','🚀'],['晨光勇者','🌅'],['三日堅持','💎'],['飲食達人','🥗'],
  ['知識探索','📚'],['六日燃燒','🔥'],['一週英雄','🦁'],['穩健前行','⚓'],
  ['九九不懈','💪'],['十全十美','⭐'],['肌肉守護','🛡️'],['代謝王者','⚡'],
  ['幸運數字','🍀'],['兩週傳奇','👑'],['中場英雄','🎯'],['意志如鋼','⚙️'],
  ['脂肪殺手','🗡️'],['十八般武藝','🥋'],['堅不可摧','🏰'],['二十天神話','🌟'],
  ['三週霸主','🦅'],['不屈鬥魂','🔱'],['燃燒吧基礎','🌋'],['最後一哩','🏁'],
  ['銀級戰士','🥈'],['金級勇者','🥇'],['傳說前夕','🌙'],['減脂傳奇','🏆'],
];
const LEVEL_THRESHOLDS = [0, 200, 500, 900, 1400, 2000, 2800];

// ============ AUDIO ============
const audioCtx = (() => {
  try { return new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
})();
function tone(freq, dur = 0.15, type = 'sine', vol = 0.15, when = 0) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur);
}
const sfx = {
  click:    () => tone(800, 0.05, 'square', 0.05),
  checkin:  () => { tone(440, 0.1); tone(880, 0.15, 'sine', 0.15, 0.08); },
  correct:  () => { tone(523, 0.1); tone(659, 0.1, 'sine', 0.15, 0.1); tone(784, 0.2, 'sine', 0.15, 0.2); },
  wrong:    () => tone(220, 0.3, 'sawtooth', 0.12),
  badge:    () => { [523,659,784,1047,1319].forEach((f,i) => tone(f, 0.15, 'triangle', 0.18, i*0.08)); },
  levelup:  () => { [262,330,392,523,659,784,1047].forEach((f,i)=>tone(f,0.18,'sine',0.18,i*0.1)); },
};

// ============ HELPERS ============
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const today = () => new Date().toISOString().split('T')[0];
function showToast(msg, type = 'success') {
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 300); }, 2200);
}
function calcLevel(xp) {
  let lv = 1;
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= LEVEL_THRESHOLDS[i]) { lv = i + 1; break; }
  }
  return lv;
}
function gameDay() {
  if (!state.config?.start_date) return 1;
  const start = new Date(state.config.start_date);
  const now = new Date();
  return Math.max(1, Math.min(28, Math.floor((now - start) / 86400000) + 1));
}

// ============ DATA ============
async function loadConfig() {
  const { data } = await sb.from('smr_game_config').select('*').eq('id', 1).single();
  state.config = data;
}

async function loadUserData() {
  if (!state.user) return;
  const uid = state.user.id;
  const [body, quiz, meals, badges] = await Promise.all([
    sb.from('smr_body_records').select('*').eq('user_id', uid).order('recorded_date', { ascending: true }),
    sb.from('smr_quiz_records').select('*').eq('user_id', uid),
    sb.from('smr_meal_checkins').select('*').eq('user_id', uid),
    sb.from('smr_badges').select('*').eq('user_id', uid),
  ]);
  state.bodyRecords = body.data || [];
  state.quizRecords = quiz.data || [];
  state.mealCheckins = meals.data || [];
  state.badges = badges.data || [];
}

async function loadTodayQuiz() {
  const day = gameDay();
  const { data } = await sb.from('smr_quiz_questions').select('*').eq('day_number', day).maybeSingle();
  state.todayQuiz = data;
}

async function addXP(amount) {
  state.user.xp += amount;
  const newLv = calcLevel(state.user.xp);
  const leveledUp = newLv > state.user.level;
  state.user.level = newLv;
  await sb.from('smr_users').update({ xp: state.user.xp, level: state.user.level }).eq('id', state.user.id);
  if (leveledUp) { sfx.levelup(); showToast(`🎉 升等！Lv ${newLv}`); }
}

// ============ AUTH ============
async function checkPhone(phone) {
  const { data } = await sb.from('smr_users').select('*').eq('phone', phone).maybeSingle();
  return data;
}
async function loginUser(phone) {
  const u = await checkPhone(phone);
  if (!u) return null;
  state.user = u;
  localStorage.setItem('smr_phone', phone);
  await loadUserData();
  await loadTodayQuiz();
  return u;
}
async function registerUser(phone, name, password, avatar) {
  if (password !== state.config.registration_password) {
    throw new Error('報名密碼錯誤');
  }
  const { data, error } = await sb.from('smr_users').insert({ phone, name, avatar }).select().single();
  if (error) throw error;
  state.user = data;
  localStorage.setItem('smr_phone', phone);
  await loadUserData();
  await loadTodayQuiz();
  return data;
}

// ============ ACTIONS ============
async function submitQuiz(answerIdx) {
  if (state.quizState?.answered) return;
  const correct = answerIdx === state.todayQuiz.answer_index;
  state.quizState = { ...state.quizState, selected: answerIdx, answered: true, correct };
  await sb.from('smr_quiz_records').insert({
    user_id: state.user.id, quiz_day: state.todayQuiz.day_number, is_correct: correct
  });
  state.quizRecords.push({ user_id: state.user.id, quiz_day: state.todayQuiz.day_number, is_correct: correct });
  if (correct) { sfx.correct(); await addXP(20); }
  else { sfx.wrong(); await addXP(5); }
  render();
}

async function checkIn(meal) {
  const has = state.mealCheckins.find(c => c.checkin_date === today() && c.meal_type === meal);
  if (has) return showToast('已打過卡', 'error');
  await sb.from('smr_meal_checkins').insert({ user_id: state.user.id, meal_type: meal, checkin_date: today() });
  state.mealCheckins.push({ user_id: state.user.id, meal_type: meal, checkin_date: today() });
  sfx.checkin(); showToast(`✓ ${meal === 'breakfast' ? '早餐' : meal === 'lunch' ? '午餐' : '晚餐'}打卡成功`);
  await addXP(10);
  await checkBadgeEligibility();
  render();
}

async function checkBadgeEligibility() {
  const day = gameDay();
  const hasBadge = state.badges.find(b => b.day_number === day);
  if (hasBadge) return;
  const todayMeals = state.mealCheckins.filter(c => c.checkin_date === today());
  const todayQuizDone = state.quizRecords.find(q => q.quiz_day === day);
  if (todayMeals.length >= 3 && todayQuizDone) {
    // can claim
    state.canClaimBadge = day;
  }
}

async function claimBadge() {
  const day = gameDay();
  if (state.badges.find(b => b.day_number === day)) return;
  await sb.from('smr_badges').insert({ user_id: state.user.id, day_number: day });
  state.badges.push({ user_id: state.user.id, day_number: day });
  sfx.badge(); showToast(`🏅 ${BADGE_NAMES[day-1][0]} 獲得！`);
  await addXP(30);
  state.canClaimBadge = null;
  render();
}

async function submitBodyRecord(form) {
  const has = state.bodyRecords.find(r => r.recorded_date === today());
  if (has) return showToast('今日已記錄', 'error');
  const rec = {
    user_id: state.user.id,
    weight: parseFloat(form.weight),
    body_fat_pct: parseFloat(form.body_fat),
    muscle_mass: parseFloat(form.muscle),
    visceral_fat: parseInt(form.visceral),
    recorded_date: today(),
  };
  const { data, error } = await sb.from('smr_body_records').insert(rec).select().single();
  if (error) return showToast('儲存失敗', 'error');
  state.bodyRecords.push(data);
  showToast('✓ 數據已記錄');
  await addXP(15);
  state.page = 'records'; render();
}

// ============ HEALTH REPORT ============
function generateReport(rec, prevRec) {
  const fat = rec.body_fat_pct;
  const muscle = rec.muscle_mass;
  const visceral = rec.visceral_fat;
  const weight = rec.weight;

  // CID 判定（簡化：以體脂與肌肉量綜合）
  let cid = 'I型', cidDesc = '均衡型，健康基礎好';
  if (fat > 25 && muscle < 30) { cid = 'C型'; cidDesc = '脂肪偏多、肌肉量需提升，代謝症候群風險需注意'; }
  else if (muscle > 36) { cid = 'D型'; cidDesc = '肌肉量充足、代謝強，注意熱量控制'; }

  const fatStatus = fat > 25 ? '⚠️ 偏高' : fat < 18 ? '⚠️ 偏低' : '✅ 正常';
  const muscleStatus = muscle < 28 ? '⚠️ 偏低' : '✅ 正常';
  const visceralStatus = visceral > 9 ? '⚠️ 偏高' : visceral < 2 ? '⚠️ 偏低' : '✅ 正常';

  const trend = prevRec ? (fat - prevRec.body_fat_pct).toFixed(1) : null;
  const proteinNeed = Math.round(weight * 1.5);

  return {
    cid, cidDesc,
    fatStatus, muscleStatus, visceralStatus,
    trend, proteinNeed,
    warnings: [
      visceral > 9 && '內臟脂肪偏高，建議肝功能追蹤、控制精緻碳水',
      fat > 30 && '體脂率過高，注意心血管風險',
      muscle < 25 && '肌肉量過低，加強阻力訓練',
    ].filter(Boolean),
  };
}

function renderChart() {
  if (state.bodyRecords.length === 0) {
    return `<div class="card-cyber" style="text-align:center; padding:40px;">
      <div style="font-size:48px;">📊</div>
      <div style="margin-top:12px; color:rgba(255,255,255,0.6);">尚未記錄數據<br>前往「身體數據」頁開始</div>
    </div>`;
  }
  const data = state.bodyRecords;
  const maxW = Math.max(...data.map(r => r.weight)) + 2;
  const minW = Math.min(...data.map(r => r.weight)) - 2;
  const maxF = Math.max(...data.map(r => r.body_fat_pct)) + 5;
  const minF = Math.min(...data.map(r => r.body_fat_pct)) - 5;
  const W = 320, H = 180, P = 30;
  const xStep = data.length > 1 ? (W - P*2) / (data.length - 1) : 0;

  const wPath = data.map((r, i) => {
    const x = P + i * xStep;
    const y = H - P - ((r.weight - minW) / (maxW - minW)) * (H - P*2);
    return `${i===0?'M':'L'}${x},${y}`;
  }).join(' ');
  const fPath = data.map((r, i) => {
    const x = P + i * xStep;
    const y = H - P - ((r.body_fat_pct - minF) / (maxF - minF)) * (H - P*2);
    return `${i===0?'M':'L'}${x},${y}`;
  }).join(' ');

  return `
  <div class="card-cyber">
    <div style="font-weight:700; margin-bottom:12px;">📈 趨勢圖</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00b4d8"/><stop offset="100%" stop-color="#0066ff"/></linearGradient>
      </defs>
      <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="rgba(255,255,255,0.1)"/>
      <line x1="${P}" y1="${P}" x2="${P}" y2="${H-P}" stroke="rgba(255,255,255,0.1)"/>
      <path d="${wPath}" stroke="url(#g1)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="${fPath}" stroke="#ff7c2a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      ${data.map((r, i) => {
        const x = P + i * xStep;
        const yw = H - P - ((r.weight - minW) / (maxW - minW)) * (H - P*2);
        const yf = H - P - ((r.body_fat_pct - minF) / (maxF - minF)) * (H - P*2);
        return `<circle cx="${x}" cy="${yw}" r="3" fill="#00b4d8"/><circle cx="${x}" cy="${yf}" r="3" fill="#ff7c2a"/>`;
      }).join('')}
    </svg>
    <div style="display:flex; gap:12px; justify-content:center; margin-top:8px; font-size:12px;">
      <span style="color:#00b4d8;">● 體重 kg</span>
      <span style="color:#ff7c2a;">● 體脂 %</span>
    </div>
  </div>`;
}

    const fatLost = myBody.length >= 2 ? (myBody[0].body_fat_pct - myBody[myBody.length-1].body_fat_pct) : 0;
    const checkinDays = new Set(meals.filter(m => m.user_id === u.id).map(m => m.checkin_date)).size;
    const quizCorrect = quizzes.filter(q => q.user_id === u.id && q.is_correct).length;
    return { ...u, fatLost, checkinDays, quizCorrect };
  });

  if (tab === 'fat') arr.sort((a,b) => b.fatLost - a.fatLost);
  else if (tab === 'checkin') arr.sort((a,b) => b.checkinDays - a.checkinDays);
  else arr.sort((a,b) => b.quizCorrect - a.quizCorrect);

  const myIdx = arr.findIndex(u => u.id === state.user.id);
  const top10 = arr.slice(0, 10);
  const showMe = myIdx >= 10;

  const valKey = tab === 'fat' ? 'fatLost' : tab === 'checkin' ? 'checkinDays' : 'quizCorrect';
  const valSuffix = tab === 'fat' ? '%' : tab === 'checkin' ? ' 天' : ' 題';

  $('#rank-content').innerHTML = `
    ${top10.map((u, i) => `
      <div class="card-cyber" style="margin-bottom:6px; padding:10px 14px; ${u.id === state.user.id ? 'border-color: var(--orange);':''}">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="font-display" style="font-size:22px; width:36px; text-align:center; ${i<3?'color:var(--gold); text-shadow:0 0 12px var(--gold)':'color:rgba(255,255,255,0.5)'}">

          <div style="flex:1;">

          </div>
          <div class="font-display glow-orange" style="font-size:18px;">
            ${tab==='fat' ? (u[valKey] >= 0 ? '↓' : '↑') : ''}${Math.abs(u[valKey]).toFixed(tab==='fat'?1:0)}${valSuffix}
          </div>
        </div>
      </div>
    `).join('')}
    ${showMe ? `
      <div style="margin-top:12px; padding:8px 0; border-top:1px dashed rgba(255,255,255,0.2);"></div>
      <div class="card-cyber" style="border-color:var(--orange); padding:10px 14px;">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="font-display" style="font-size:18px; width:36px; text-align:center; color:var(--orange)">#${myIdx+1}</div>
          <div style="font-size:28px;">${state.user.avatar}</div>
          <div style="flex:1;">

          </div>
          <div class="font-display glow-orange" style="font-size:18px;">
            ${tab==='fat' ? (arr[myIdx][valKey] >= 0 ? '↓' : '↑') : ''}${Math.abs(arr[myIdx][valKey]).toFixed(tab==='fat'?1:0)}${valSuffix}
          </div>
        </div>
      </div>
    ` : ''}
  `;
}

function parseQuizMD(text) {
  const blocks = text.split(/\n(?=Day\s+\d+)/i);
  const questions = [];
  for (const block of blocks) {
    const dayMatch = block.match(/Day\s+(\d+)/i);
    const qMatch = block.match(/問題[:：]\s*(.+)/);
    const aMatch = block.match(/^A[.\s]\s*(.+)/m);
    const bMatch = block.match(/^B[.\s]\s*(.+)/m);
    const cMatch = block.match(/^C[.\s]\s*(.+)/m);
    const dMatch = block.match(/^D[.\s]\s*(.+)/m);
    const ansMatch = block.match(/答案[:：]\s*([ABCD])/i);
    const expMatch = block.match(/解析[:：]\s*(.+)/);

    if (dayMatch && qMatch && aMatch && bMatch && cMatch && dMatch && ansMatch) {
      questions.push({
        day_number: parseInt(dayMatch[1]),
        question: qMatch[1].trim(),
        option_a: aMatch[1].trim(),
        option_b: bMatch[1].trim(),
        option_c: cMatch[1].trim(),
        option_d: dMatch[1].trim(),
        answer_index: 'ABCD'.indexOf(ansMatch[1].toUpperCase()),
        explanation: expMatch ? expMatch[1].trim() : null,
      });
    }
  }
  return questions;
}

async function importQuestions(replaceAll) {
  const text = $('#ad-import-text').value;
  const questions = parseQuizMD(text);
  if (questions.length === 0) {
    $('#ad-import-preview').innerHTML = '<div style="color:#ff3d3d;">❌ 解析失敗：無法找到任何題目，請檢查格式</div>';
    return;
  }
  if (!confirm(`成功解析 ${questions.length} 題，${replaceAll ? '覆蓋現有所有題目' : '存在的題目會被更新'}，繼續嗎？`)) return;

  if (replaceAll) {
    await sb.from('smr_quiz_questions').delete().neq('day_number', -1);
  }

  // upsert
  const { error } = await sb.from('smr_quiz_questions').upsert(questions, { onConflict: 'day_number' });
  if (error) {
    $('#ad-import-preview').innerHTML = `<div style="color:#ff3d3d;">❌ 寫入失敗：${error.message}</div>`;
    return;
  }
  $('#ad-import-preview').innerHTML = `<div style="color:#4caf50;">✓ 成功匯入 ${questions.length} 題</div>`;
  showToast(`✓ 匯入 ${questions.length} 題完成`);
  await loadQuizGrid();
}

function exportQuizMD() {
  if (allQuestions.length === 0) return showToast('題庫為空', 'error');
  const md = allQuestions.sort((a,b) => a.day_number - b.day_number).map(q => {
    const ans = ['A','B','C','D'][q.answer_index];
    return `Day ${q.day_number}\n問題：${q.question}\nA. ${q.option_a}\nB. ${q.option_b}\nC. ${q.option_c}\nD. ${q.option_d}\n答案：${ans}${q.explanation ? '\n解析：' + q.explanation : ''}`;
  }).join('\n\n');

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `smr_quiz_export_${new Date().toISOString().split('T')[0]}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ 已匯出 ${allQuestions.length} 題`);
}

// ============ EVENT LISTENERS ============
function attachListeners() {
  $$('[data-nav]').forEach(el => el.onclick = () => { sfx.click(); state.page = el.dataset.nav; render(); });
  $$('[data-action="quiz"]').forEach(el => el.onclick = () => { sfx.click(); state.quizState = null; state.page = 'quiz'; render(); });
  $$('[data-action="claim-badge"]').forEach(el => el.onclick = () => claimBadge());
  $$('[data-meal]').forEach(el => el.onclick = () => checkIn(el.dataset.meal));
  $$('[data-quiz-opt]').forEach(el => el.onclick = () => submitQuiz(parseInt(el.dataset.quizOpt)));
  $$('[data-tab]').forEach(el => el.onclick = () => {
    state.rankTab = el.dataset.tab; sfx.click(); render();
  });
  $$('[data-rtab]').forEach(el => el.onclick = () => { state.recordTab = el.dataset.rtab; sfx.click(); render(); });

  if (state.page === 'rank') renderRankContent();
  if (state.page === 'body') {
    const f = $('#body-form');
    if (f) f.onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(f);
      submitBodyRecord(Object.fromEntries(fd));
    };
  }
}

// ============ INIT ============
async function init() {
  await loadConfig();
  const savedPhone = localStorage.getItem('smr_phone');
  if (savedPhone) {
    const u = await loginUser(savedPhone);
    if (u) { state.page = 'home'; render(); return; }
  }
  state.page = 'login'; render();
}
init();
</script>
