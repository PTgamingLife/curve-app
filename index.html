<style>
:root {
  /* 輕快淺色 - Super Meng v2 */
  --bg:        #F7F9FC;   /* 天空白底 */
  --bg-soft:   #FFFFFF;   /* 純白卡片 */
  --ink:       #2D3142;   /* 墨黑（柔字）*/
  --ink-soft:  #6B7280;   /* 灰字 */
  --border:    #E8ECF1;   /* 細邊框 */

  --primary:   #FF6B6B;   /* 珊瑚紅（主色）*/
  --primary-l: #FFE5E5;   /* 珊瑚紅淡底 */
  --mint:      #4ECDC4;   /* 薄荷藍綠 */
  --mint-l:    #E0F7F5;   /* 薄荷淡底 */
  --sun:       #FFE66D;   /* 陽光黃 */
  --sun-l:     #FFF8D6;   /* 陽光淡底 */

  /* 兼容舊變數名 - 讓既有程式碼不必大改 */
  --dark:        var(--bg-soft);
  --darker:      var(--bg);
  --orange:      var(--primary);
  --orange-glow: #FF8E8E;
  --blue:        var(--mint);
  --blue-glow:   #7EE0D8;
  --pink:        #FF8FB3;
  --gold:        #FFC857;
}
* { -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: 'Noto Sans TC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  overflow-x: hidden;
}
.font-display { font-family: 'Quicksand', 'Noto Sans TC', sans-serif; letter-spacing: 0.5px; font-weight: 700; }
.font-handwrite { font-family: 'Caveat', 'Noto Sans TC', cursive; }

/* 淺色柔和背景 — 水彩風漸層 */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    radial-gradient(circle at 18% 22%, rgba(255,107,107,0.06) 0%, transparent 45%),
    radial-gradient(circle at 82% 78%, rgba(78,205,196,0.07) 0%, transparent 45%),
    radial-gradient(circle at 50% 110%, rgba(255,230,109,0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* 健身印花漂浮動畫 */
.deco {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.14;
  filter: drop-shadow(0 2px 4px rgba(45,49,66,0.08));
}
@keyframes floatY {
  0%, 100% { transform: translateY(0) rotate(var(--rot, 0deg)); }
  50%      { transform: translateY(calc(var(--dy, -16px) * 2)) rotate(calc(var(--rot, 0deg) + var(--spin, 6deg))); }
}
@keyframes floatXY {
  0%   { transform: translate(0,0) rotate(var(--rot, 0deg)); }
  25%  { transform: translate(calc(var(--dx, 8px) * 2), calc(var(--dy, -10px) * 2)) rotate(calc(var(--rot, 0deg) + 8deg)); }
  50%  { transform: translate(0, calc(var(--dy, -20px) * 2)) rotate(calc(var(--rot, 0deg) - 4deg)); }
  75%  { transform: translate(calc(var(--dx, 8px) * -2), calc(var(--dy, -10px) * 2)) rotate(calc(var(--rot, 0deg) + 4deg)); }
  100% { transform: translate(0,0) rotate(var(--rot, 0deg)); }
}
.deco-float {
  animation: floatY var(--dur, 6s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}
.deco-drift {
  animation: floatXY var(--dur, 10s) ease-in-out infinite;
  animation-delay: var(--delay, 0s);
}

#app {
  position: relative; z-index: 1;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), #FF8FB3);
  color: var(--ink); font-weight: 700; letter-spacing: 1px;
  padding: 14px 24px; border-radius: 999px;
  border: none;
  box-shadow: 0 6px 18px rgba(255,107,107,0.35), 0 2px 4px rgba(0,0,0,0.04);
  cursor: pointer; transition: all 0.18s;
  font-family: 'Quicksand','Noto Sans TC', sans-serif;
}
.btn-primary:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(255,107,107,0.3); }

.btn-cyber {
  background: linear-gradient(135deg, var(--mint), #7EE0D8);
  color: var(--ink); font-weight: 700;
  padding: 12px 20px; border-radius: 14px;
  border: none;
  box-shadow: 0 4px 14px rgba(78,205,196,0.32);
  cursor: pointer; transition: all 0.18s;
  font-family: 'Quicksand','Noto Sans TC', sans-serif;
}
.btn-cyber:active { transform: scale(0.96); }

.card-cyber {
  background: var(--bg-soft);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 4px 16px rgba(45,49,66,0.06), 0 1px 3px rgba(45,49,66,0.04);
  padding: 16px;
  position: relative;
  overflow: hidden;
  color: var(--ink);
}
.card-cyber::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--primary), var(--sun), var(--mint));
  opacity: 0.85;
}

.card-orange {
  background: linear-gradient(135deg, var(--primary-l), #FFF0EB);
  border: 1.5px solid rgba(255,107,107,0.25);
  border-radius: 18px;
  padding: 16px;
  color: var(--ink);
}

.input-cyber {
  background: var(--bg-soft);
  border: 1.5px solid var(--border);
  color: var(--ink);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 16px;
  outline: none;
  width: 100%;
  font-family: inherit;
  transition: all 0.2s;
}
.input-cyber:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255,107,107,0.12); }
.input-cyber::placeholder { color: var(--ink-soft); opacity: 0.55; }

.glow-text { text-shadow: 0 1px 2px rgba(45,49,66,0.1); }
.glow-orange { color: var(--primary); }
.glow-blue { color: var(--mint); }
.glow-gold { color: #E5A600; }

/* Animations */
@keyframes pulse-glow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,107,107,0.5); }
  50%      { box-shadow: 0 0 0 14px rgba(255,107,107,0); }
}
.pulse-glow { animation: pulse-glow 1.5s infinite; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-4px); }
  75% { transform: translateX(4px); }
}
.shake { animation: shake 0.4s; }

@keyframes badge-rotate {
  0% { transform: rotate(0deg) scale(1); }
  50% { transform: rotate(180deg) scale(1.1); }
  100% { transform: rotate(360deg) scale(1); }
}
.badge-celebrate { animation: badge-rotate 1.5s ease-in-out; }

@keyframes slide-up {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: slide-up 0.3s ease; }

/* Bottom nav */
.bottom-nav {
  position: sticky; bottom: 0;
  background: rgba(255,255,255,0.92);
  border-top: 1.5px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 8px 0 12px;
  backdrop-filter: blur(12px);
  box-shadow: 0 -2px 12px rgba(45,49,66,0.04);
  z-index: 50;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 10px;
  cursor: pointer;
  color: var(--ink-soft);
  font-size: 11px; font-weight: 700;
  transition: color 0.2s;
  background: none; border: none;
  font-family: inherit;
}
.nav-item.active { color: var(--primary); }
.nav-item .icon { font-size: 22px; }

/* Toast */
.toast {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: var(--bg-soft);
  border: 1.5px solid var(--primary);
  color: var(--ink); padding: 12px 20px; border-radius: 999px;
  z-index: 999; font-weight: 700;
  box-shadow: 0 6px 20px rgba(255,107,107,0.18), 0 2px 6px rgba(0,0,0,0.06);
  animation: toast-pop 0.25s ease;
}
@keyframes toast-pop {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.85); }
  to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.toast.error { border-color: #FF6B6B; color: #C92A2A; }
.toast.success { border-color: #4ECDC4; color: #1B7A75; }

/* Avatar grid */
.avatar-cell {
  width: 56px; height: 56px;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; cursor: pointer;
  transition: all 0.15s;
}
.avatar-cell.selected {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(255,107,107,0.18);
  transform: scale(1.08);
}

/* Quiz options */
.quiz-opt {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-soft);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer; transition: all 0.2s;
  text-align: left; width: 100%;
  color: var(--ink); font-family: inherit;
  font-size: 15px;
}
.quiz-opt:hover { border-color: var(--mint); background: var(--mint-l); }
.quiz-opt.correct { background: var(--mint-l); border-color: #4ECDC4; color: #1B7A75; }
.quiz-opt.wrong   { background: var(--primary-l); border-color: #FF6B6B; color: #B33A3A; }

/* Badge cell — 圓形 */
.badge-cell {
  aspect-ratio: 1;
  background: var(--bg-soft);
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1px; padding: 4px;
  position: relative;
  transition: all 0.2s;
  cursor: pointer;
}
.badge-cell.earned {
  background: radial-gradient(circle, var(--sun-l) 0%, #FFF0CC 100%);
  border-color: #FFC857;
  box-shadow: 0 4px 14px rgba(255,200,87,0.35), inset 0 0 8px rgba(255,209,102,0.2);
}
.badge-cell.today {
  animation: pulse-glow 1.4s infinite;
  border-color: var(--primary);
  background: radial-gradient(circle, var(--primary-l) 0%, #FFF0EB 100%);
}
.badge-cell .day-num {
  position: absolute; top: 4px;
  font-size: 9px; font-weight: 900;
  opacity: 0.6;
  font-family: 'Quicksand', sans-serif;
  color: var(--ink-soft);
}
.badge-cell:active { transform: scale(0.92); }

/* Progress bar */
.bar-track {
  background: var(--bg);
  border-radius: 999px;
  overflow: hidden;
  height: 10px;
  border: 1px solid var(--border);
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--mint), var(--sun), var(--primary));
  transition: width 0.5s;
}

/* Tabs */
.tab-row {
  display: flex; gap: 6px;
  background: var(--bg);
  padding: 4px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 8px 12px; border-radius: 999px;
  border: none; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 700;
  background: transparent; color: var(--ink-soft);
  transition: all 0.2s;
}
.tab-btn.active {
  background: linear-gradient(135deg, var(--primary), #FF8FB3);
  color: var(--ink);
  box-shadow: 0 4px 12px rgba(255,107,107,0.35);
}

/* Loading - 奔跑人偶 */
.spinner {
  width: 40px; height: 40px;
  border: 4px solid rgba(0,180,216,0.2);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 跑步人偶載入動畫 */
.runner-loader {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px;
  padding: 20px;
}
.runner-svg {
  width: 84px; height: 110px;
  animation: runner-bounce 0.5s ease-in-out infinite;
  filter: drop-shadow(0 6px 12px rgba(255,107,107,0.35));
}
.runner-svg .leg-front { animation: leg-swing-fwd 0.5s ease-in-out infinite; transform-origin: 26px 50px; }
.runner-svg .leg-back  { animation: leg-swing-bwd 0.5s ease-in-out infinite; transform-origin: 34px 50px; }
.runner-svg .arm-front { animation: arm-swing-fwd 0.5s ease-in-out infinite; transform-origin: 22px 26px; }
.runner-svg .arm-back  { animation: arm-swing-bwd 0.5s ease-in-out infinite; transform-origin: 38px 26px; }

@keyframes runner-bounce {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-6px); }
}
@keyframes leg-swing-fwd {
  0%, 100% { transform: rotate(-35deg); }
  50%      { transform: rotate(35deg); }
}
@keyframes leg-swing-bwd {
  0%, 100% { transform: rotate(35deg); }
  50%      { transform: rotate(-35deg); }
}
@keyframes arm-swing-fwd {
  0%, 100% { transform: rotate(25deg); }
  50%      { transform: rotate(-30deg); }
}
@keyframes arm-swing-bwd {
  0%, 100% { transform: rotate(-30deg); }
  50%      { transform: rotate(25deg); }
}

.runner-track {
  width: 140px; height: 6px;
  background: linear-gradient(90deg, transparent, var(--border) 30%, var(--border) 70%, transparent);
  border-radius: 3px;
  position: relative; overflow: hidden;
}
.runner-track::before {
  content: '';
  position: absolute; top: 0; left: -30%;
  width: 30%; height: 100%;
  background: linear-gradient(90deg, transparent, var(--primary), transparent);
  animation: track-slide 1.5s linear infinite;
}
@keyframes track-slide {
  to { transform: translateX(450%); }
}

.runner-label {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700; color: var(--ink);
  font-size: 14px; letter-spacing: 3px;
}
.runner-subtle {
  font-size: 11px; color: var(--ink-soft);
  letter-spacing: 1px;
}

/* 愛心光芒 */
@keyframes heart-burst {
  0%   { transform: scale(1); }
  20%  { transform: scale(1.6); filter: drop-shadow(0 0 20px var(--pink)) drop-shadow(0 0 40px var(--pink)); }
  60%  { transform: scale(1.3); filter: drop-shadow(0 0 30px var(--pink)) drop-shadow(0 0 60px var(--orange)); }
  100% { transform: scale(1); filter: drop-shadow(0 0 0 transparent); }
}
.heart-burst { animation: heart-burst 1.1s ease-out; }

@keyframes float-heart {
  0%   { transform: translate(0,0) scale(0.6); opacity: 1; }
  100% { transform: translate(var(--tx), -80px) scale(1.4); opacity: 0; }
}
.floating-heart {
  position: absolute; top: 0; left: 50%;
  pointer-events: none; font-size: 22px; z-index: 5;
  animation: float-heart 1.4s ease-out forwards;
}
</style>
</head>

<div id="app">
  <div class="runner-loader" style="min-height:100vh;">

function getNutrientLink(name) {
  if (!name) return ISHARE_URLS.VIT_MIN;
  // 正規化：小寫、去空白與全形符號
  const normalized = name.toLowerCase().replace(/[\s（）()\-　_+&]/g, '');
  // 1. 完全比對
  if (NUTRIENT_ISHARE_URLS[normalized]) return NUTRIENT_ISHARE_URLS[normalized];
  // 2. 模糊比對：找出包含此關鍵字或被此關鍵字包含的條目
  for (const [key, url] of Object.entries(NUTRIENT_ISHARE_URLS)) {
    if (normalized.includes(key.toLowerCase()) || key.toLowerCase().includes(normalized)) return url;
  }
  // 3. 預設：維生素礦物質系列主頁
  return ISHARE_URLS.VIT_MIN;
}

const audioCtx = (() => {
  try { return new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
})();
function tone(freq, dur = 0.15, type = 'sine', vol = 0.15, when = 0) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur);
}

// Resize + compress image to base64 (max 800px, jpeg quality 0.7)
async function fileToCompressedBase64(file, maxSize = 800, quality = 0.7) {
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = URL.createObjectURL(file);
  });
  const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
  const w = Math.round(img.width * ratio);
  const h = Math.round(img.height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(img.src);
  return canvas.toDataURL('image/jpeg', quality);
}

// 壓縮成 Blob（不轉 base64，給 Storage 用）
async function fileToCompressedBlob(file, maxSize = 800, quality = 0.7) {
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = URL.createObjectURL(file);
  });
  const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
  const w = Math.round(img.width * ratio);
  const h = Math.round(img.height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(img.src);
  return new Promise(res => canvas.toBlob(res, 'image/jpeg', quality));
}

// 上傳到 Storage 並回傳 public URL
async function uploadToStorage(blob, filename) {
  const { error } = await sb.storage.from('smr-photos').upload(filename, blob, {
    contentType: 'image/jpeg',
    upsert: true,
  });
  if (error) throw new Error('上傳失敗：' + error.message);
  const { data: pub } = sb.storage.from('smr-photos').getPublicUrl(filename);
  return pub.publicUrl;
}

// 同時生成主圖 + 縮圖，上傳兩個檔，回傳 {photoUrl, thumbUrl}
async function uploadPhotoWithThumb(file, userId) {
  const [mainBlob, thumbBlob] = await Promise.all([
    fileToCompressedBlob(file, 800, 0.78),
    fileToCompressedBlob(file, 200, 0.7),
  ]);
  const ts = Date.now();
  const [photoUrl, thumbUrl] = await Promise.all([
    uploadToStorage(mainBlob, `lunch/${userId}/${ts}.jpg`),
    uploadToStorage(thumbBlob, `lunch/${userId}/${ts}_thumb.jpg`),
  ]);
  return { photoUrl, thumbUrl };
}

function calcLevel(xp) {
  let lv = 1;
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= LEVEL_THRESHOLDS[i]) { lv = i + 1; break; }

  return lv;
}
function gameDay() {
  if (!state.config?.start_date) return 1;
  const start = new Date(state.config.start_date);
  const now = new Date();
  return Math.max(1, Math.min(28, Math.floor((now - start) / 86400000) + 1));
}

function isCompetitionEnded() {
  if (!state.config?.start_date) return false;
  const start = new Date(state.config.start_date);
  const now = new Date();
  return (now - start) / 86400000 >= 27; // 第 28 天起可結賽
}

      .not('photo_url', 'is', null);

    if (error || !rows || rows.length === 0) {
      await sb.rpc('smr_mark_cleanup_done');
      return { deleted: 0 };
    }

    // 2. 提取 Storage 路徑
    const paths = [];
    rows.forEach(r => {
      const p1 = storagePathFromUrl(r.photo_url);
      const p2 = storagePathFromUrl(r.thumb_url);
      if (p1) paths.push(p1);
      if (p2) paths.push(p2);
    });

    // 3. 從 Storage 刪除（每批最多 100 個）
    for (let i = 0; i < paths.length; i += 100) {
      await sb.storage.from('smr-photos').remove(paths.slice(i, i + 100));
    }

    // 4. 把 DB 裡的 photo_url / thumb_url 清空
    const ids = rows.map(r => r.id);
    for (let i = 0; i < ids.length; i += 200) {
      await sb.from('smr_meal_checkins')
        .update({ photo_url: null, thumb_url: null })
        .in('id', ids.slice(i, i + 200));
    }

    // 5. 更新清理時間戳
    await sb.rpc('smr_mark_cleanup_done');

    console.log(`[Cleanup] 刪除 ${paths.length} 個舊照片 (${rows.length} 筆記錄)`);
    return { deleted: rows.length };
  } catch (e) {
    console.warn('[Cleanup] 清理失敗：', e);
    return { deleted: 0, error: e.message };
  }
}

// Lazy 觸發：每天僅清理一次（類似排行榜快取機制）

// 緩存今日所有照片 + 排序好的清單
let _photoWallCache = null;

async function loadPhotoWall(forceRefresh = false) {
  if (_photoWallCache && !forceRefresh) return _photoWallCache;

  const day = today();
  const { data: checkins } = await sb.from('smr_meal_checkins')
    .select('id, user_id, checkin_date, photo_url, thumb_url, created_at')
    .eq('checkin_date', day)
    .not('photo_url', 'is', null)
    .order('created_at', { ascending: false })
    .limit(100); // 每天最多顯示 100 張，避免尖峰流量過高

  if (!checkins?.length) { _photoWallCache = []; return []; }

  const userIds = [...new Set(checkins.map(c => c.user_id))];
  const checkinIds = checkins.map(c => c.id);

  const [users, likes] = await Promise.all([
    sb.from('smr_users').select('id, name, avatar').in('id', userIds),
    sb.from('smr_photo_likes').select('*').in('checkin_id', checkinIds),
  ]);

  const userMap = Object.fromEntries((users.data || []).map(u => [u.id, u]));
  const likesByCheckin = {};
  for (const l of (likes.data || [])) {
    if (!likesByCheckin[l.checkin_id]) likesByCheckin[l.checkin_id] = [];
    likesByCheckin[l.checkin_id].push(l);
  }

  const enriched = checkins.map(c => ({
    ...c,
    user: userMap[c.user_id] || { name: '匿名', avatar: '👤' },
    likeCount: (likesByCheckin[c.id] || []).length,
    iLiked: (likesByCheckin[c.id] || []).some(l => l.liker_id === state.user.id),
    iPinned: (likesByCheckin[c.id] || []).some(l => l.liker_id === state.user.id && l.is_pinned),
  }));

  enriched.sort((a, b) => {
    if (a.iPinned !== b.iPinned) return b.iPinned - a.iPinned;
    if (a.iLiked !== b.iLiked) return b.iLiked - a.iLiked;
    if (b.likeCount !== a.likeCount) return b.likeCount - a.likeCount;
    return b.created_at.localeCompare(a.created_at);
  });

  _photoWallCache = enriched;
  return enriched;
}

async function updateHomeHearts() {
  const numEl = document.getElementById('heart-count-num');
  const iconEl = document.getElementById('heart-icon');
  if (!numEl || !iconEl) return;

  const current = await loadMyHeartsToday();
  numEl.textContent = current;

  // 第一次載入只更新數字，不放動畫
  if (_lastHeartCount === null) {
    _lastHeartCount = current;
  } else if (current > _lastHeartCount) {
    const delta = current - _lastHeartCount;
    _lastHeartCount = current;
    // 連續播放 delta 次動畫
    for (let i = 0; i < delta; i++) {
      setTimeout(() => playHeartBurst(iconEl), i * 280);
    }
  } else if (current < _lastHeartCount) {
    _lastHeartCount = current;
  }

  // 啟動輪詢（每 8 秒檢查一次）
  if (!_heartPollTimer) {
    _heartPollTimer = setInterval(() => {
      if (state.page === 'home') updateHomeHearts();
      else { clearInterval(_heartPollTimer); _heartPollTimer = null; }
    }, 8000);
  }
}

function playHeartBurst(iconEl) {
  iconEl.classList.remove('heart-burst');
  void iconEl.offsetWidth; // 強制 reflow 重啟動畫
  iconEl.classList.add('heart-burst');

  // 飛出去的小愛心
  const card = document.getElementById('heart-card');
  if (card) {
    const fh = document.createElement('div');
    fh.className = 'floating-heart';
    fh.textContent = ['❤️','💖','💗','💓','💕'][Math.floor(Math.random()*5)];
    fh.style.setProperty('--tx', (Math.random()*60 - 30) + 'px');
    card.appendChild(fh);
    setTimeout(() => fh.remove(), 1500);
  }

  // 音效
  if (audioCtx) tone(880 + Math.random()*200, 0.12, 'sine', 0.1);
}

  const { data: target } = await sb.from('smr_users')
    .select('id, name, phone').eq('phone', phone).maybeSingle();
  if (!target) throw new Error('找不到此手機號碼的玩家');

  // 檢查是否已加
  const exists = state.friends?.find(f => f.id === target.id);

  const body = {

    max_tokens: 8192,
    messages: [{

      ]
    }]
  };

  const MAX_ATTEMPTS = 8;
  // 透過 Edge Function 代理（API key 在伺服器端，前端看不到）
  const url = `${SUPABASE_URL}/functions/v1/ai-analyze`;

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        },
        body: JSON.stringify(body)
      });

      if (res.status === 429 || res.status === 503 || res.status === 529) {
        if (attempt === MAX_ATTEMPTS) throw new Error('系統忙碌，請稍後再試（已重試 8 次）');
        const baseDelay = Math.min(4000 * Math.pow(1.5, attempt - 1), 60000);
        const jitter = Math.random() * 2000;
        const wait = baseDelay + jitter;
        setAIStatus(`<div style="text-align:center;">
          <div style="font-size:14px; color:var(--orange);">⏳ 系統繁忙，自動重試中...</div>
          <div style="font-size:12px; color:var(--ink-soft); margin-top:4px;">第 ${attempt}/${MAX_ATTEMPTS} 次嘗試 · 等待 ${Math.round(wait/1000)} 秒</div>
        </div>`);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }

      if (!res.ok) {
        const err = await res.text();
        console.error('Claude error:', err);
        throw new Error('AI 呼叫失敗 (' + res.status + ')：' + err.slice(0, 300));
      }

      const json = await res.json();
      console.log('Claude response:', json);

      if (json.type === 'error') throw new Error(json.error?.message || '未知錯誤');
      if (json.stop_reason === 'refusal') throw new Error('AI 拒絕回應，請更換照片');

      const text = json.content?.[0]?.text;
      if (!text) throw new Error('AI 回傳格式錯誤（無 text 欄位）');

      setAIStatus(`<div style="color:#4caf50; text-align:center;">✓ AI 分析完成，整理中...</div>`);

      // 強化 JSON 解析
      let cleaned = text.trim();
      cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');
      const firstBrace = cleaned.indexOf('{');
      const lastBrace = cleaned.lastIndexOf('}');
      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      }

      // 第一次嘗試
      try { return JSON.parse(cleaned); } catch {}

      // 第二次：嘗試修復常見問題
      // 1. 移除註解
      let repaired = cleaned.replace(/\/\/[^\n]*/g, '').replace(/\/\*[\s\S]*?\*\//g, '');
      // 2. 移除尾隨逗號
      repaired = repaired.replace(/,(\s*[}\]])/g, '$1');
      // 3. 中文標點轉英文
      repaired = repaired.replace(/，/g, ',').replace(/：/g, ':').replace(/"/g, '"').replace(/"/g, '"');
      try { return JSON.parse(repaired); } catch {}

      // 第三次：截斷修復（output 被切斷時）
      // 找出最後一個完整的 } 配對
      let braceCount = 0, lastValidEnd = -1;
      for (let i = 0; i < cleaned.length; i++) {
        if (cleaned[i] === '{') braceCount++;
        else if (cleaned[i] === '}') { braceCount--; if (braceCount === 0) lastValidEnd = i; }
      }
      if (lastValidEnd > 0) {
        try { return JSON.parse(cleaned.slice(0, lastValidEnd + 1)); } catch {}
      }

      // 全部失敗 → 印出原始內容方便除錯
      console.error('===== RAW AI TEXT =====');
      console.error(text);
      console.error('===== CLEANED =====');
      console.error(cleaned);

      // 顯示前 200 字錯誤
      const preview = text.slice(0, 200).replace(/\s+/g, ' ');
      throw new Error(`JSON 解析失敗（已截斷重試）。回傳開頭：${preview}...`);
    } catch (e) {
      if (attempt === MAX_ATTEMPTS) throw e;
      // network error → also retry
      if (e.message?.includes('fetch') || e.message?.includes('network')) {
        const wait = 3000 + Math.random() * 2000;
        setAIStatus(`<div style="color:var(--orange); text-align:center;">⚠️ 連線中斷，${Math.round(wait/1000)} 秒後重試...</div>`);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }
      throw e; // 其他錯誤直接拋出
    }
  }
}

async function runFullAIAnalysis(form, facePhoto, tonguePhoto) {
  if (state.user.ai_used) return showToast('每帳號限用一次 AI 分析', 'error');

  showQueueOverlay();

  let queueId = null;
  try {
    // 1. 加入排隊
    const { data: q } = await sb.from('smr_ai_queue').insert({ user_id: state.user.id, status: 'waiting' }).select().single();
    queueId = q.id;

    // 2. 輪詢排隊狀態，直到輪到自己
    while (true) {
      const { data: status } = await sb.rpc('smr_queue_status', { queue_id: queueId });
      const myPos = status?.[0]?.queue_pos || 1;
      const processing = status?.[0]?.processing_count || 0;
      updateQueueUI(myPos, processing);

      if (myPos === 1) {
        const { data: dispatched } = await sb.rpc('smr_try_dispatch', { queue_id: queueId });
        if (dispatched) break;
      }
      // 輪詢間隔：位置越前越頻繁（加大間隔降低 150 人同時輪詢的負載）
      const waitMs = myPos <= 3 ? 2500 : myPos <= 10 ? 4000 : 6000;
      await new Promise(r => setTimeout(r, waitMs));
    }

    // 3. 切換至 AI 處理動畫
    transitionToProcessing();
    const report = await callClaudeAI(facePhoto, tonguePhoto, form);

    // save to user
    await sb.from('smr_users').update({
      ai_used: true,
      ai_report: report,
      face_photo_url: facePhoto,
      tongue_photo_url: tonguePhoto,
    }).eq('id', state.user.id);

    state.user.ai_used = true;
    state.user.ai_report = report;
    state.user.face_photo_url = facePhoto;
    state.user.tongue_photo_url = tonguePhoto;

    // also save body record
    const rec = {
      user_id: state.user.id,
      weight: parseFloat(form.weight),
      body_fat_pct: parseFloat(form.body_fat),
      muscle_mass: parseFloat(form.muscle),
      visceral_fat: parseInt(form.visceral),
      recorded_date: today(),
    };
    const { data } = await sb.from('smr_body_records').upsert(rec, { onConflict: 'user_id,recorded_date' }).select().single();
    if (data) {
      const idx = state.bodyRecords.findIndex(r => r.recorded_date === today());
      if (idx >= 0) state.bodyRecords[idx] = data; else state.bodyRecords.push(data);
    }

    // 4. 標記完成
    if (queueId) await sb.from('smr_ai_queue').update({ status: 'done', completed_at: new Date().toISOString() }).eq('id', queueId);

function updateQueueUI(myPos, processing) {
  const info = document.getElementById('queue-info');
  const line = document.getElementById('queue-line');
  if (!info || !line) return;

  // 顯示我前面 + 我自己 + 後面，最多 8 個人偶
  const colors = ['#ff7c2a','#00b4d8','#ff3d9a','#ffd166','#5fdfff','#ff9a5a','#a78bfa','#4ade80'];
  const total = Math.min(myPos + 2, 8);
  let figures = '';
  for (let i = 0; i < total; i++) {
    const isMe = (i === myPos - 1);
    const color = isMe ? '#ff7c2a' : colors[i % colors.length];
    figures += humanoidSVG(color, i * 0.15, isMe);
  }
  line.innerHTML = figures;

  let icon = '⏳', msg, sub;
  if (myPos === 1) {
    icon = '🚀'; msg = '即將傳送'; sub = '正在取得執行 slot...';
  } else if (myPos <= 5) {
    msg = `排隊位置 #${myPos}`; sub = `預計等待 ${(myPos-1)*5} 秒`;
  } else if (myPos <= 15) {
    msg = `排隊位置 #${myPos}`; sub = `預計等待 ${Math.round((myPos-1)*4.5)} 秒`;
  } else {
    msg = `排隊位置 #${myPos}`; sub = `預計等待 ${Math.round((myPos-1)*4)} 秒（系統繁忙）`;
  }

  info.innerHTML = `
    <div class="font-display glow-orange" style="font-size:28px;">${icon} ${msg}</div>
    <div style="font-size:13px; color:var(--ink); margin-top:4px;">${sub}</div>
    <div style="font-size:11px; color:var(--blue); margin-top:6px;">⚡ 系統處理中：${processing} 人</div>
  `;
}

// ============ HEALTH REPORT ============
function generateReport(rec, prevRec) {
  const fat = rec.body_fat_pct;
  const muscle = rec.muscle_mass;
  const visceral = rec.visceral_fat;
  const weight = rec.weight;

  // CID 判定（簡化：以體脂與肌肉量綜合）
  let cid = 'I型', cidDesc = '均衡型，健康基礎好';
  if (fat > 25 && muscle < 30) { cid = 'C型'; cidDesc = '脂肪偏多、肌肉量需提升，代謝症候群風險需注意'; }
  else if (muscle > 36) { cid = 'D型'; cidDesc = '肌肉量充足、代謝強，注意熱量控制'; }

  const fatStatus = fat > 25 ? '⚠️ 偏高' : fat < 18 ? '⚠️ 偏低' : '✅ 正常';
  const muscleStatus = muscle < 28 ? '⚠️ 偏低' : '✅ 正常';
  const visceralStatus = visceral > 9 ? '⚠️ 偏高' : visceral < 2 ? '⚠️ 偏低' : '✅ 正常';

  const trend = prevRec ? (fat - prevRec.body_fat_pct).toFixed(1) : null;
  const proteinNeed = Math.round(weight * 1.5);

  return {
    cid, cidDesc,
    fatStatus, muscleStatus, visceralStatus,
    trend, proteinNeed,
    warnings: [
      visceral > 9 && '內臟脂肪偏高，建議肝功能追蹤、控制精緻碳水',
      fat > 30 && '體脂率過高，注意心血管風險',
      muscle < 25 && '肌肉量過低，加強阻力訓練',
    ].filter(Boolean),
  };
}

function renderChart() {
  if (state.bodyRecords.length === 0) {
    return `<div class="card-cyber" style="text-align:center; padding:40px;">
      <div style="font-size:48px;">📊</div>
      <div style="margin-top:12px; color:var(--ink-soft);">尚未記錄數據<br>前往「身體數據」頁開始</div>
    </div>`;
  }
  const data = state.bodyRecords;
  const maxW = Math.max(...data.map(r => r.weight)) + 2;
  const minW = Math.min(...data.map(r => r.weight)) - 2;
  const maxF = Math.max(...data.map(r => r.body_fat_pct)) + 5;
  const minF = Math.min(...data.map(r => r.body_fat_pct)) - 5;
  const W = 320, H = 180, P = 30;
  const xStep = data.length > 1 ? (W - P*2) / (data.length - 1) : 0;

  const wPath = data.map((r, i) => {
    const x = P + i * xStep;
    const y = H - P - ((r.weight - minW) / (maxW - minW)) * (H - P*2);
    return `${i===0?'M':'L'}${x},${y}`;
  }).join(' ');
  const fPath = data.map((r, i) => {
    const x = P + i * xStep;
    const y = H - P - ((r.body_fat_pct - minF) / (maxF - minF)) * (H - P*2);
    return `${i===0?'M':'L'}${x},${y}`;
  }).join(' ');

  return `
  <div class="card-cyber">
    <div style="font-weight:700; margin-bottom:12px;">📈 趨勢圖</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00b4d8"/><stop offset="100%" stop-color="#0066ff"/></linearGradient>
      </defs>
      <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="rgba(255,255,255,0.1)"/>
      <line x1="${P}" y1="${P}" x2="${P}" y2="${H-P}" stroke="rgba(255,255,255,0.1)"/>
      <path d="${wPath}" stroke="url(#g1)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="${fPath}" stroke="#ff7c2a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      ${data.map((r, i) => {
        const x = P + i * xStep;
        const yw = H - P - ((r.weight - minW) / (maxW - minW)) * (H - P*2);
        const yf = H - P - ((r.body_fat_pct - minF) / (maxF - minF)) * (H - P*2);
        return `<circle cx="${x}" cy="${yw}" r="3" fill="#00b4d8"/><circle cx="${x}" cy="${yf}" r="3" fill="#ff7c2a"/>`;
      }).join('')}
    </svg>
    <div style="display:flex; gap:12px; justify-content:center; margin-top:8px; font-size:12px;">
      <span style="color:#00b4d8;">● 體重 kg</span>
      <span style="color:#ff7c2a;">● 體脂 %</span>
    </div>
  </div>`;
}

  const el = document.getElementById('photowall-content');
  if (!el) return;

    </div>`;
    return;
  }

  // 第一頁
  const firstBatch = photos.slice(0, PHOTOS_PER_PAGE);
  el.innerHTML = `
    <div style="font-size:11px; color:var(--ink-soft); margin-bottom:8px;">

    </div>

}

function bindPhotoCardListeners() {
  // 點縮圖看大圖
  document.querySelectorAll('.photo-thumb-wrap').forEach(el => {
    el.onclick = () => {
      const card = el.closest('[data-full]');
      openPhotoLightbox(card.dataset.full);
    };
  });
  // 愛心
  document.querySelectorAll('[data-like]').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const liked = btn.dataset.liked === 'true';
      btn.style.transform = 'scale(1.3)';
      setTimeout(() => btn.style.transform = 'scale(1)', 200);
      await toggleLike(btn.dataset.like, liked);
      // 局部更新該卡片
      _photoWallCache = null;
      const photos = await loadPhotoWall();
      const updated = photos.find(p => p.id === btn.dataset.like);
      if (updated) {
        const card = btn.closest('[data-photo-id]');
        if (card) card.outerHTML = photoCardHTML(updated);
        bindPhotoCardListeners();
      }
    };
  });
  // 置頂
  document.querySelectorAll('[data-pin]').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const pinned = btn.dataset.pinned === 'true';
      await togglePin(btn.dataset.pin, pinned);
      showToast(pinned ? '已取消置頂' : '✓ 已置頂該用戶', 'success');
      // 置頂後需要重新排序，全部重畫
      renderPhotoWallContent();
    };
  });
}

function setupPhotoInfiniteScroll() {
  const sentinel = document.getElementById('photo-loadmore');
  if (!sentinel) return;
  const obs = new IntersectionObserver(async (entries) => {
    if (!entries[0].isIntersecting || _photoWallLoading) return;
    const photos = await loadPhotoWall();
    const totalShown = _photoWallPage * PHOTOS_PER_PAGE;
    if (totalShown >= photos.length) {
      sentinel.textContent = '— 已顯示全部 —';
      obs.disconnect();
      return;
    }
    _photoWallLoading = true;
    _photoWallPage++;
    const nextBatch = photos.slice(totalShown, totalShown + PHOTOS_PER_PAGE);
    const grid = document.getElementById('photo-grid');
    if (grid) grid.insertAdjacentHTML('beforeend', nextBatch.map(p => photoCardHTML(p)).join(''));
    bindPhotoCardListeners();
    _photoWallLoading = false;
    if (_photoWallPage * PHOTOS_PER_PAGE >= photos.length) {
      sentinel.textContent = '— 已顯示全部 —';
      obs.disconnect();
    }
  }, { rootMargin: '200px' });
  obs.observe(sentinel);
}

// 排行榜快取：依 rank_type 從 smr_leaderboard_cache 讀取
// 若 cache 超過 24 小時，自動觸發後端重算（lazy refresh）
async function ensureLeaderboardFresh() {
  try {
    const { data: ageData } = await sb.rpc('smr_leaderboard_age_hours');
    const ageHours = parseFloat(ageData);
    if (isNaN(ageHours) || ageHours > 24) {
      // 觸發後端重算
      await sb.rpc('smr_compute_leaderboard');
    }
  } catch (e) {
    console.warn('Leaderboard refresh check failed (will use existing cache):', e);
  }
}

    let weightPhotoFile = null;

      weightPhotoFile = f;
      try {
        const preview = await fileToCompressedBase64(f, 500, 0.55);
        $('#reg-weight-preview').innerHTML = `
          <img src="${preview}" style="width:100%; max-height:200px; object-fit:contain; border-radius:12px; border:2px solid var(--mint); margin-top:10px; background:#fff;" />
          <div style="font-size:11px; color:var(--mint); text-align:center; margin-top:4px;">✓ 已選擇，送出時自動上傳</div>
        `;
      } catch { showToast('圖片處理失敗', 'error'); }
    };

    $('#back-btn').onclick = () => { state.loginStep = 'phone'; render(); };
    $('#reg-submit').onclick = async () => {
      const name = $('#reg-name').value.trim();
      const pwd = $('#reg-pwd').value;
      const birthdate = $('#reg-birthdate').value;
      const gender = $('#reg-gender').value;
      const pin = $('#reg-pin').value.trim();
      const secQ = $('#reg-sec-q').value;
      const secA = $('#reg-sec-a').value.trim();
      const consent = $('#reg-consent').checked;
      if (!name) return showToast('請輸入姓名', 'error');
      if (!pwd) return showToast('請輸入報名密碼', 'error');
      if (!birthdate) return showToast('請選擇生日', 'error');
      if (!gender) return showToast('請選擇性別', 'error');
      if (!pin || pin.length < 4 || !/^\d+$/.test(pin)) return showToast('請設定 4～6 位數字密碼', 'error');
      if (!secA) return showToast('請輸入安全問題答案', 'error');
      if (!consent) return showToast('請閱讀並勾選隱私同意', 'error');
      if (!weightPhotoFile) return showToast('請上傳開賽前體重照片', 'error');

      const btn = $('#reg-submit');
      btn.disabled = true; btn.textContent = '上傳照片中...';
      try {
        const folderId = state.registerData.phone || 'unknown';
        const { photoUrl } = await uploadPhotoWithThumb(weightPhotoFile, `register/${folderId}`);
        weightPhotoUrl = photoUrl;

        btn.textContent = '註冊中...';
        const newUser = await registerUser(state.registerData.phone, name, pwd, avatar, birthdate, gender, weightPhotoUrl);
        if (newUser?.id) {
          await sb.rpc('smr_set_user_pin', { p_user_id: newUser.id, p_pin: pin });
          await sb.rpc('smr_set_security_qa', { p_user_id: newUser.id, p_question: secQ, p_answer: secA });
        }
        showToast('🎉 歡迎加入！密碼已設定');
        state.page = 'home'; render();
        ensureCleanupFresh();
      } catch (e) {
        btn.disabled = false; btn.textContent = '完成註冊 · 開始挑戰';
        showToast(e.message || '註冊失敗', 'error');
      }
    };
    return;
  }
}

async function handlePhoneSubmit() {
  const phone = $('#login-phone').value.trim();
  const pin   = ($('#login-pin')?.value || '').trim();
  if (!phone) return showToast('請輸入電話號碼', 'error');
  sfx.click();

  const existing = await checkPhone(phone);
  if (!existing) {
    // 查無此號 → 前往註冊
    state.registerData = { phone };
    state.loginStep = 'register';
    render();
    return;
  }

  if (!existing.pin_hash) {
    // 從未設過 PIN → 強制設定（不可跳過）
    state.loginPending = existing;
    state.loginStep = 'set-pin';
    render();
    return;
  }

  // 已有密碼：直接在同一畫面驗證
  if (!pin) return showToast('請輸入密碼', 'error');
  const btn = $('#phone-submit');
  btn.disabled = true; btn.textContent = '驗證中...';
  const { data: ok } = await sb.rpc('smr_verify_user_pin', { p_user_id: existing.id, p_pin: pin });
  if (ok) {
    await completeLogin(existing);
  } else {
    // 密碼錯誤 → 需通過安全問答才能重填
    state.loginPending = existing;
    state.loginStep = 'reset-password';
    render();
  }
}

async function completeLogin(user) {
  state.user = user;
  localStorage.setItem('smr_phone', user.phone);
  await loadUserData();
  await loadTodayQuiz();
  showToast(`👋 歡迎回來 ${user.name}`);
  state.page = 'home'; render();
  ensureCleanupFresh();
}

function parseQuizMD(text) {
  const blocks = text.split(/\n(?=Day\s+\d+)/i);
  const questions = [];
  for (const block of blocks) {
    const dayMatch = block.match(/Day\s+(\d+)/i);
    const qMatch = block.match(/問題[:：]\s*(.+)/);
    const aMatch = block.match(/^A[.\s]\s*(.+)/m);
    const bMatch = block.match(/^B[.\s]\s*(.+)/m);
    const cMatch = block.match(/^C[.\s]\s*(.+)/m);
    const dMatch = block.match(/^D[.\s]\s*(.+)/m);
    const ansMatch = block.match(/答案[:：]\s*([ABCD])/i);
    const expMatch = block.match(/解析[:：]\s*(.+)/);

    if (dayMatch && qMatch && aMatch && bMatch && cMatch && dMatch && ansMatch) {
      questions.push({
        day_number: parseInt(dayMatch[1]),
        question: qMatch[1].trim(),
        option_a: aMatch[1].trim(),
        option_b: bMatch[1].trim(),
        option_c: cMatch[1].trim(),
        option_d: dMatch[1].trim(),
        answer_index: 'ABCD'.indexOf(ansMatch[1].toUpperCase()),
        explanation: expMatch ? expMatch[1].trim() : null,
      });
    }
  }
  return questions;
}

async function importQuestions(replaceAll) {
  const text = $('#ad-import-text').value;
  const questions = parseQuizMD(text);
  if (questions.length === 0) {
    $('#ad-import-preview').innerHTML = '<div style="color:#ff3d3d;">❌ 解析失敗：無法找到任何題目，請檢查格式</div>';
    return;
  }
  if (!confirm(`成功解析 ${questions.length} 題，${replaceAll ? '覆蓋現有所有題目' : '存在的題目會被更新'}，繼續嗎？`)) return;

  if (replaceAll) {
    await sb.from('smr_quiz_questions').delete().neq('day_number', -1);
  }

  // upsert
  const { error } = await sb.from('smr_quiz_questions').upsert(questions, { onConflict: 'day_number' });
  if (error) {
    $('#ad-import-preview').innerHTML = `<div style="color:#ff3d3d;">❌ 寫入失敗：${error.message}</div>`;
    return;
  }
  $('#ad-import-preview').innerHTML = `<div style="color:#4caf50;">✓ 成功匯入 ${questions.length} 題</div>`;
  showToast(`✓ 匯入 ${questions.length} 題完成`);
  await loadQuizGrid();
}

function exportQuizMD() {
  if (allQuestions.length === 0) return showToast('題庫為空', 'error');
  const md = allQuestions.sort((a,b) => a.day_number - b.day_number).map(q => {
    const ans = ['A','B','C','D'][q.answer_index];
    return `Day ${q.day_number}\n問題：${q.question}\nA. ${q.option_a}\nB. ${q.option_b}\nC. ${q.option_c}\nD. ${q.option_d}\n答案：${ans}${q.explanation ? '\n解析：' + q.explanation : ''}`;
  }).join('\n\n');

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `smr_quiz_export_${new Date().toISOString().split('T')[0]}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ 已匯出 ${allQuestions.length} 題`);
}

    }, 5000);
  }
}

// ============ INIT ============
async function init() {
  // 5 秒 fallback：避免無限等待
  const failsafe = setTimeout(() => {
    if (state.page === 'login' && !state.user) {
      state.page = 'login'; render();
    }
  }, 5000);

  try {
    await loadConfig();
    const savedPhone = localStorage.getItem('smr_phone');
    if (savedPhone) {
      const u = await loginUser(savedPhone);
      if (u) {
        clearTimeout(failsafe);
        // 本機快取登入（已信任設備，跳過 PIN）
        state.page = 'home'; render();
        if (typeof showIOSInstallTip === 'function') showIOSInstallTip();
        ensureCleanupFresh();
        return;
      }
    }
  } catch (e) {
    console.error('Init error:', e);
  }
  clearTimeout(failsafe);
  state.page = 'login'; render();
}
init();
</script>
