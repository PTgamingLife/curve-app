<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://wcemkmwrlvijxxwybrgs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndjZW1rbXdybHZpanh4d3licmdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzA1NDgsImV4cCI6MjA5MDcwNjU0OH0.Ji557wlvrS7YgflU9ANEm9To6AXLc47EFPaMHTgGARg';

// ============ STATE ============
const state = {

};

const AVATARS = ['💪','🏃','🥗','🔥','⚡','🌟','🦁','🎯'];
const BADGE_NAMES = [
  ['啟程鬥士','🚀'],['晨光勇者','🌅'],['三日堅持','💎'],['飲食達人','🥗'],
  ['知識探索','📚'],['六日燃燒','🔥'],['一週英雄','🦁'],['穩健前行','⚓'],
  ['九九不懈','💪'],['十全十美','⭐'],['肌肉守護','🛡️'],['代謝王者','⚡'],
  ['幸運數字','🍀'],['兩週傳奇','👑'],['中場英雄','🎯'],['意志如鋼','⚙️'],
  ['脂肪殺手','🗡️'],['十八般武藝','🥋'],['堅不可摧','🏰'],['二十天神話','🌟'],
  ['三週霸主','🦅'],['不屈鬥魂','🔱'],['燃燒吧基礎','🌋'],['最後一哩','🏁'],
  ['銀級戰士','🥈'],['金級勇者','🥇'],['傳說前夕','🌙'],['減脂傳奇','🏆'],
];
const LEVEL_THRESHOLDS = [0, 200, 500, 900, 1400, 2000, 2800];

// ============ AUDIO ============
const audioCtx = (() => {
  try { return new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
})();
function tone(freq, dur = 0.15, type = 'sine', vol = 0.15, when = 0) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0 + dur);
}
const sfx = {
  click:    () => tone(800, 0.05, 'square', 0.05),
  checkin:  () => { tone(440, 0.1); tone(880, 0.15, 'sine', 0.15, 0.08); },
  correct:  () => { tone(523, 0.1); tone(659, 0.1, 'sine', 0.15, 0.1); tone(784, 0.2, 'sine', 0.15, 0.2); },
  wrong:    () => tone(220, 0.3, 'sawtooth', 0.12),
  badge:    () => { [523,659,784,1047,1319].forEach((f,i) => tone(f, 0.15, 'triangle', 0.18, i*0.08)); },
  levelup:  () => { [262,330,392,523,659,784,1047].forEach((f,i)=>tone(f,0.18,'sine',0.18,i*0.1)); },
};

// ============ HELPERS ============
const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);
const today = () => new Date().toISOString().split('T')[0];

// Resize + compress image to base64 (max 800px, jpeg quality 0.7)
async function fileToCompressedBase64(file, maxSize = 800, quality = 0.7) {
  const img = await new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = URL.createObjectURL(file);
  });
  const ratio = Math.min(maxSize / img.width, maxSize / img.height, 1);
  const w = Math.round(img.width * ratio);
  const h = Math.round(img.height * ratio);
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(img, 0, 0, w, h);
  URL.revokeObjectURL(img.src);
  return canvas.toDataURL('image/jpeg', quality);
}
function showToast(msg, type = 'success') {
  const div = document.createElement('div');
  div.className = `toast ${type}`;
  div.textContent = msg;
  document.body.appendChild(div);
  setTimeout(() => { div.style.opacity = '0'; setTimeout(() => div.remove(), 300); }, 2200);
}
function calcLevel(xp) {
  let lv = 1;
  for (let i = LEVEL_THRESHOLDS.length - 1; i >= 0; i--) {
    if (xp >= LEVEL_THRESHOLDS[i]) { lv = i + 1; break; }
  }
  return lv;
}
function gameDay() {
  if (!state.config?.start_date) return 1;
  const start = new Date(state.config.start_date);
  const now = new Date();
  return Math.max(1, Math.min(28, Math.floor((now - start) / 86400000) + 1));
}

// ============ DATA ============
async function loadConfig() {
  const { data } = await sb.from('smr_game_config').select('*').eq('id', 1).single();
  state.config = data;
}

async function loadUserData() {
  if (!state.user) return;
  const uid = state.user.id;
  const [body, quiz, meals, badges] = await Promise.all([
    sb.from('smr_body_records').select('*').eq('user_id', uid).order('recorded_date', { ascending: true }),
    sb.from('smr_quiz_records').select('*').eq('user_id', uid),
    sb.from('smr_meal_checkins').select('*').eq('user_id', uid),
    sb.from('smr_badges').select('*').eq('user_id', uid),
  ]);
  state.bodyRecords = body.data || [];
  state.quizRecords = quiz.data || [];
  state.mealCheckins = meals.data || [];
  state.badges = badges.data || [];
  checkBadgeEligibility();
}

async function loadTodayQuiz() {
  const day = gameDay();
  const { data } = await sb.from('smr_quiz_questions').select('*').eq('day_number', day).maybeSingle();
  state.todayQuiz = data;
}

async function addXP(amount) {
  state.user.xp += amount;
  const newLv = calcLevel(state.user.xp);
  const leveledUp = newLv > state.user.level;
  state.user.level = newLv;
  await sb.from('smr_users').update({ xp: state.user.xp, level: state.user.level }).eq('id', state.user.id);
  if (leveledUp) { sfx.levelup(); showToast(`🎉 升等！Lv ${newLv}`); }
}

// ============ AUTH ============
async function checkPhone(phone) {
  const { data } = await sb.from('smr_users').select('*').eq('phone', phone).maybeSingle();
  return data;
}
async function loginUser(phone) {
  const u = await checkPhone(phone);
  if (!u) return null;
  state.user = u;
  localStorage.setItem('smr_phone', phone);
  await loadUserData();
  await loadTodayQuiz();
  return u;
}
async function registerUser(phone, name, password, avatar) {
  if (password !== state.config.registration_password) {
    throw new Error('報名密碼錯誤');
  }
  const { data, error } = await sb.from('smr_users').insert({ phone, name, avatar }).select().single();
  if (error) throw error;
  state.user = data;
  localStorage.setItem('smr_phone', phone);
  await loadUserData();
  await loadTodayQuiz();
  return data;
}

// ============ ACTIONS ============
async function submitQuiz(answerIdx) {
  if (state.quizState?.answered) return;
  const correct = answerIdx === state.todayQuiz.answer_index;
  state.quizState = { ...state.quizState, selected: answerIdx, answered: true, correct };
  await sb.from('smr_quiz_records').insert({
    user_id: state.user.id, quiz_day: state.todayQuiz.day_number, is_correct: correct
  });
  state.quizRecords.push({ user_id: state.user.id, quiz_day: state.todayQuiz.day_number, is_correct: correct });
  if (correct) { sfx.correct(); await addXP(20); }
  else { sfx.wrong(); await addXP(5); }
  checkBadgeEligibility();
  render();
}

async function checkIn(meal, photoBase64) {
  const has = state.mealCheckins.find(c => c.checkin_date === today() && c.meal_type === meal);
  if (has) return showToast('已打過卡', 'error');
  if (!photoBase64) return showToast('請上傳餐點照片', 'error');
  const { data, error } = await sb.from('smr_meal_checkins').insert({
    user_id: state.user.id, meal_type: meal, checkin_date: today(), photo_url: photoBase64
  }).select().single();
  if (error) return showToast('打卡失敗', 'error');
  state.mealCheckins.push(data);
  sfx.checkin(); showToast(`✓ 午餐打卡成功`);
  await addXP(10);
  checkBadgeEligibility();
  render();
}

function checkBadgeEligibility() {
  const day = gameDay();
  const hasBadge = state.badges.find(b => b.day_number === day);
  if (hasBadge) { state.canClaimBadge = null; return; }
  const lunchToday = state.mealCheckins.find(c => c.checkin_date === today() && c.meal_type === 'lunch');
  const todayQuizDone = state.quizRecords.find(q => q.quiz_day === day);
  if (lunchToday && todayQuizDone) {
    state.canClaimBadge = day;
  } else {
    state.canClaimBadge = null;
  }
}

async function claimBadge() {
  const day = gameDay();
  if (state.badges.find(b => b.day_number === day)) return;
  await sb.from('smr_badges').insert({ user_id: state.user.id, day_number: day });
  state.badges.push({ user_id: state.user.id, day_number: day });
  sfx.badge(); showToast(`🏅 ${BADGE_NAMES[day-1][0]} 獲得！`);
  await addXP(30);
  state.canClaimBadge = null;
  render();
}

async function submitBodyRecord(form) {
  const has = state.bodyRecords.find(r => r.recorded_date === today());
  if (has) return showToast('今日已記錄', 'error');
  const rec = {
    user_id: state.user.id,
    weight: parseFloat(form.weight),
    body_fat_pct: parseFloat(form.body_fat),
    muscle_mass: parseFloat(form.muscle),

async function callGeminiAI(facePhoto, tonguePhoto, bodyData) {
  const key = state.config?.ai_api_key;
  if (!key) throw new Error('AI 金鑰未設定，請聯絡管理員');

  const prompt = `你是一位精通中醫面診與舌診的養生顧問，具備長庚紀念醫院舌診研究室的專業知識。

參考標準：
- 長庚醫院舌診資料庫研究（CCMP96-RD-005）
- 氣血虛體質看舌淡（PPV 80.24%）
- 氣滯血瘀看苔薄（特異度 93.33%）
- 陰虛看舌紅（靈敏度 53.33%）

使用者身體數據：
- 體重：${bodyData.weight} kg
- 體脂率：${bodyData.body_fat}%
- 肌肉量：${bodyData.muscle} kg
- 內臟脂肪：${bodyData.visceral}

請分析附上的面部照片（第一張）與舌診照片（第二張），結合身體數據，輸出純 JSON（無 markdown），格式：

{
  "faceZones": [
    {"zone":"額頭","organ":"...","status":"正常|輕微失調|需注意"},
    {"zone":"鼻部","organ":"...","status":"..."},
    {"zone":"左頰","organ":"...","status":"..."},
    {"zone":"右頰","organ":"...","status":"..."},
    {"zone":"眼周","organ":"...","status":"..."},
    {"zone":"下巴","organ":"...","status":"..."}
  ],
  "tongueAnalysis": [
    {"item":"舌色","observation":"...","meaning":"中醫意義20-30字"},
    {"item":"苔色","observation":"...","meaning":"..."},
    {"item":"苔厚薄","observation":"...","meaning":"..."},
    {"item":"舌形","observation":"...","meaning":"..."},
    {"item":"濕潤度","observation":"...","meaning":"..."}
  ],
  "constitution": {"type":"陰虛|陽虛|氣虛|血虛|氣滯|血瘀|痰濕|正常","description":"50-80字","crossVerify":"30-50字"},
  "nutrients": [
    {"name":"營養素","reason":"20-30字","foods":"10-15字"},
    {"name":"營養素","reason":"...","foods":"..."},
    {"name":"營養素","reason":"...","foods":"..."}
  ],
  "dietAdvice": {
    "eat": [
      {"food":"...","reason":"15-25字"},
      {"food":"...","reason":"..."},
      {"food":"...","reason":"..."}
    ],
    "avoid": {"food":"...","reason":"15-25字"}
  },
  "acupoints": [
    {"name":"穴位","location":"取穴位置","effect":"功效"},
    {"name":"...","location":"...","effect":"..."},
    {"name":"...","location":"...","effect":"..."}
  ],
  "lifestyle": ["建議1","建議2","建議3"],
  "westernNotes": ["西醫提示1","提示2","提示3"]
}

繁體中文，養生參考非醫療診斷。`;

  // strip data:image/jpeg;base64, prefix
  const cleanBase64 = (s) => s.replace(/^data:image\/\w+;base64,/, '');

  const body = {
    contents: [{
      parts: [
        { text: prompt },
        { inlineData: { mimeType: 'image/jpeg', data: cleanBase64(facePhoto) } },
        { inlineData: { mimeType: 'image/jpeg', data: cleanBase64(tonguePhoto) } },
      ]
    }],
    generationConfig: {
      temperature: 0.7,
      responseMimeType: 'application/json',
      maxOutputTokens: 4096,
    }
  };

  // 重試機制：最多 8 次，指數退避 (4s, 6s, 10s, 18s, 30s, 45s, 60s)
  // 設計給 150 人 / 2 小時的尖峰使用情境
  const MAX_ATTEMPTS = 8;
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (res.status === 429 || res.status === 503) {
        // Rate limit / overloaded — exponential backoff with jitter
        if (attempt === MAX_ATTEMPTS) throw new Error('系統忙碌，請稍後再試（已重試 8 次）');
        const baseDelay = Math.min(4000 * Math.pow(1.5, attempt - 1), 60000);
        const jitter = Math.random() * 2000;
        const wait = baseDelay + jitter;
        setAIStatus(`<div style="text-align:center;">
          <div style="font-size:14px; color:var(--orange);">⏳ 系統繁忙，自動重試中...</div>
          <div style="font-size:12px; color:rgba(255,255,255,0.6); margin-top:4px;">第 ${attempt}/${MAX_ATTEMPTS} 次嘗試 · 等待 ${Math.round(wait/1000)} 秒</div>
        </div>`);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }

      if (!res.ok) {
        const err = await res.text();
        console.error('Gemini error:', err);
        throw new Error('AI 呼叫失敗 (' + res.status + ')：' + err.slice(0, 300));
      }

      const json = await res.json();
      console.log('Gemini response:', json);

      // 檢查是否被 safety filter 阻擋
      if (json.promptFeedback?.blockReason) {
        throw new Error('內容被安全機制阻擋：' + json.promptFeedback.blockReason);
      }
      const candidate = json.candidates?.[0];
      if (!candidate) throw new Error('AI 無回傳內容（可能配額用盡或 API 異常）');
      if (candidate.finishReason && candidate.finishReason !== 'STOP') {
        console.warn('Finish reason:', candidate.finishReason);
      }

      const text = candidate.content?.parts?.[0]?.text;
      if (!text) throw new Error('AI 回傳格式錯誤（無 text 欄位）');

      setAIStatus(`<div style="color:#4caf50; text-align:center;">✓ AI 分析完成，整理中...</div>`);

      // 強化 JSON 解析：嘗試清除 markdown 包裝
      let cleaned = text.trim();
      // 去除 ```json ... ``` 或 ``` ... ``` 包裝
      cleaned = cleaned.replace(/^```(?:json)?\s*/i, '').replace(/\s*```\s*$/, '');
      // 找出第一個 { 到最後一個 } 之間的內容
      const firstBrace = cleaned.indexOf('{');
      const lastBrace = cleaned.lastIndexOf('}');
      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      }

      try {
        return JSON.parse(cleaned);
      } catch (parseErr) {
        console.error('JSON parse failed. Raw text:', text);
        throw new Error('AI 回傳 JSON 格式異常，請重試（已記錄至 console）');
      }
    } catch (e) {
      if (attempt === MAX_ATTEMPTS) throw e;
      // network error → also retry
      if (e.message?.includes('fetch') || e.message?.includes('network')) {
        const wait = 3000 + Math.random() * 2000;
        setAIStatus(`<div style="color:var(--orange); text-align:center;">⚠️ 連線中斷，${Math.round(wait/1000)} 秒後重試...</div>`);
        await new Promise(r => setTimeout(r, wait));
        continue;
      }
      throw e; // 其他錯誤直接拋出
    }
  }
}

async function runFullAIAnalysis(form, facePhoto, tonguePhoto) {
  if (state.user.ai_used) return showToast('每帳號限用一次 AI 分析', 'error');

  showQueueOverlay();

  let queueId = null;
  try {
    // 1. 加入排隊
    const { data: q } = await sb.from('smr_ai_queue').insert({ user_id: state.user.id, status: 'waiting' }).select().single();
    queueId = q.id;

    // 2. 輪詢排隊狀態，直到輪到自己
    while (true) {
      const { data: status } = await sb.rpc('smr_queue_status', { queue_id: queueId });
      const myPos = status?.[0]?.queue_pos || 1;
      const processing = status?.[0]?.processing_count || 0;
      updateQueueUI(myPos, processing);

      if (myPos === 1) {
        const { data: dispatched } = await sb.rpc('smr_try_dispatch', { queue_id: queueId });
        if (dispatched) break;
      }
      // 輪詢間隔：位置越前越頻繁
      const waitMs = myPos <= 3 ? 1500 : myPos <= 10 ? 2500 : 4000;
      await new Promise(r => setTimeout(r, waitMs));
    }

    // 3. 切換至 AI 處理動畫
    transitionToProcessing();
    const report = await callGeminiAI(facePhoto, tonguePhoto, form);

    // save to user
    await sb.from('smr_users').update({
      ai_used: true,
      ai_report: report,
      face_photo_url: facePhoto,
      tongue_photo_url: tonguePhoto,
    }).eq('id', state.user.id);

    state.user.ai_used = true;
    state.user.ai_report = report;
    state.user.face_photo_url = facePhoto;
    state.user.tongue_photo_url = tonguePhoto;

    // also save body record
    const rec = {
      user_id: state.user.id,
      weight: parseFloat(form.weight),
      body_fat_pct: parseFloat(form.body_fat),
      muscle_mass: parseFloat(form.muscle),
      visceral_fat: parseInt(form.visceral),
      recorded_date: today(),
    };
    const { data } = await sb.from('smr_body_records').upsert(rec, { onConflict: 'user_id,recorded_date' }).select().single();
    if (data) {
      const idx = state.bodyRecords.findIndex(r => r.recorded_date === today());
      if (idx >= 0) state.bodyRecords[idx] = data; else state.bodyRecords.push(data);
    }

    // 4. 標記完成
    if (queueId) await sb.from('smr_ai_queue').update({ status: 'done', completed_at: new Date().toISOString() }).eq('id', queueId);

    sfx.levelup();
    document.getElementById('ai-overlay')?.remove();
    showToast('🎉 AI 完整分析完成！');
    await addXP(50);
    render();
  } catch (e) {
    if (queueId) await sb.from('smr_ai_queue').update({ status: 'failed', completed_at: new Date().toISOString() }).eq('id', queueId);
    document.getElementById('ai-overlay')?.remove();
    showToast(e.message || 'AI 分析失敗', 'error');
  }
}

function updateQueueUI(myPos, processing) {
  const info = document.getElementById('queue-info');
  const line = document.getElementById('queue-line');
  if (!info || !line) return;

  // 顯示我前面 + 我自己 + 後面，最多 8 個人偶
  const colors = ['#ff7c2a','#00b4d8','#ff3d9a','#ffd166','#5fdfff','#ff9a5a','#a78bfa','#4ade80'];
  const total = Math.min(myPos + 2, 8);
  let figures = '';
  for (let i = 0; i < total; i++) {
    const isMe = (i === myPos - 1);
    const color = isMe ? '#ff7c2a' : colors[i % colors.length];
    figures += humanoidSVG(color, i * 0.15, isMe);
  }
  line.innerHTML = figures;

  let icon = '⏳', msg, sub;
  if (myPos === 1) {
    icon = '🚀'; msg = '即將傳送'; sub = '正在取得執行 slot...';
  } else if (myPos <= 5) {
    msg = `排隊位置 #${myPos}`; sub = `預計等待 ${(myPos-1)*5} 秒`;
  } else if (myPos <= 15) {
    msg = `排隊位置 #${myPos}`; sub = `預計等待 ${Math.round((myPos-1)*4.5)} 秒`;
  } else {
    msg = `排隊位置 #${myPos}`; sub = `預計等待 ${Math.round((myPos-1)*4)} 秒（系統繁忙）`;
  }

  info.innerHTML = `
    <div class="font-display glow-orange" style="font-size:28px;">${icon} ${msg}</div>
    <div style="font-size:13px; color:rgba(255,255,255,0.7); margin-top:4px;">${sub}</div>
    <div style="font-size:11px; color:var(--blue); margin-top:6px;">⚡ 系統處理中：${processing} 人</div>

}

// ============ HEALTH REPORT ============
function generateReport(rec, prevRec) {
  const fat = rec.body_fat_pct;
  const muscle = rec.muscle_mass;
  const visceral = rec.visceral_fat;
  const weight = rec.weight;

  // CID 判定（簡化：以體脂與肌肉量綜合）
  let cid = 'I型', cidDesc = '均衡型，健康基礎好';
  if (fat > 25 && muscle < 30) { cid = 'C型'; cidDesc = '脂肪偏多、肌肉量需提升，代謝症候群風險需注意'; }
  else if (muscle > 36) { cid = 'D型'; cidDesc = '肌肉量充足、代謝強，注意熱量控制'; }

  const fatStatus = fat > 25 ? '⚠️ 偏高' : fat < 18 ? '⚠️ 偏低' : '✅ 正常';
  const muscleStatus = muscle < 28 ? '⚠️ 偏低' : '✅ 正常';
  const visceralStatus = visceral > 9 ? '⚠️ 偏高' : visceral < 2 ? '⚠️ 偏低' : '✅ 正常';

  const trend = prevRec ? (fat - prevRec.body_fat_pct).toFixed(1) : null;
  const proteinNeed = Math.round(weight * 1.5);

  return {
    cid, cidDesc,
    fatStatus, muscleStatus, visceralStatus,
    trend, proteinNeed,
    warnings: [
      visceral > 9 && '內臟脂肪偏高，建議肝功能追蹤、控制精緻碳水',
      fat > 30 && '體脂率過高，注意心血管風險',
      muscle < 25 && '肌肉量過低，加強阻力訓練',
    ].filter(Boolean),
  };
}

function renderChart() {
  if (state.bodyRecords.length === 0) {
    return `<div class="card-cyber" style="text-align:center; padding:40px;">
      <div style="font-size:48px;">📊</div>
      <div style="margin-top:12px; color:rgba(255,255,255,0.6);">尚未記錄數據<br>前往「身體數據」頁開始</div>
    </div>`;
  }
  const data = state.bodyRecords;
  const maxW = Math.max(...data.map(r => r.weight)) + 2;
  const minW = Math.min(...data.map(r => r.weight)) - 2;
  const maxF = Math.max(...data.map(r => r.body_fat_pct)) + 5;
  const minF = Math.min(...data.map(r => r.body_fat_pct)) - 5;
  const W = 320, H = 180, P = 30;
  const xStep = data.length > 1 ? (W - P*2) / (data.length - 1) : 0;

  const wPath = data.map((r, i) => {
    const x = P + i * xStep;
    const y = H - P - ((r.weight - minW) / (maxW - minW)) * (H - P*2);
    return `${i===0?'M':'L'}${x},${y}`;
  }).join(' ');
  const fPath = data.map((r, i) => {
    const x = P + i * xStep;
    const y = H - P - ((r.body_fat_pct - minF) / (maxF - minF)) * (H - P*2);
    return `${i===0?'M':'L'}${x},${y}`;
  }).join(' ');

  return `
  <div class="card-cyber">
    <div style="font-weight:700; margin-bottom:12px;">📈 趨勢圖</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%; height:auto;">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00b4d8"/><stop offset="100%" stop-color="#0066ff"/></linearGradient>
      </defs>
      <line x1="${P}" y1="${H-P}" x2="${W-P}" y2="${H-P}" stroke="rgba(255,255,255,0.1)"/>
      <line x1="${P}" y1="${P}" x2="${P}" y2="${H-P}" stroke="rgba(255,255,255,0.1)"/>
      <path d="${wPath}" stroke="url(#g1)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="${fPath}" stroke="#ff7c2a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      ${data.map((r, i) => {
        const x = P + i * xStep;
        const yw = H - P - ((r.weight - minW) / (maxW - minW)) * (H - P*2);
        const yf = H - P - ((r.body_fat_pct - minF) / (maxF - minF)) * (H - P*2);
        return `<circle cx="${x}" cy="${yw}" r="3" fill="#00b4d8"/><circle cx="${x}" cy="${yf}" r="3" fill="#ff7c2a"/>`;
      }).join('')}
    </svg>
    <div style="display:flex; gap:12px; justify-content:center; margin-top:8px; font-size:12px;">
      <span style="color:#00b4d8;">● 體重 kg</span>
      <span style="color:#ff7c2a;">● 體脂 %</span>
    </div>
  </div>`;
}

async function renderRankContent() {
  const tab = state.rankTab;
  const { data: users } = await sb.from('smr_users').select('*');
  const { data: bodies } = await sb.from('smr_body_records').select('*');
  const { data: meals } = await sb.from('smr_meal_checkins').select('*');
  const { data: quizzes } = await sb.from('smr_quiz_records').select('*');

  let arr = users.map(u => {
    const myBody = bodies.filter(b => b.user_id === u.id).sort((a,b) => a.recorded_date.localeCompare(b.recorded_date));
    const fatLost = myBody.length >= 2 ? (myBody[0].body_fat_pct - myBody[myBody.length-1].body_fat_pct) : 0;
    const checkinDays = new Set(meals.filter(m => m.user_id === u.id).map(m => m.checkin_date)).size;
    const quizCorrect = quizzes.filter(q => q.user_id === u.id && q.is_correct).length;
    return { ...u, fatLost, checkinDays, quizCorrect };
  });

  if (tab === 'fat') arr.sort((a,b) => b.fatLost - a.fatLost);
  else if (tab === 'checkin') arr.sort((a,b) => b.checkinDays - a.checkinDays);
  else arr.sort((a,b) => b.quizCorrect - a.quizCorrect);

  const myIdx = arr.findIndex(u => u.id === state.user.id);
  const top10 = arr.slice(0, 10);
  const showMe = myIdx >= 10;

  const valKey = tab === 'fat' ? 'fatLost' : tab === 'checkin' ? 'checkinDays' : 'quizCorrect';
  const valSuffix = tab === 'fat' ? '%' : tab === 'checkin' ? ' 天' : ' 題';

  $('#rank-content').innerHTML = `
    ${top10.map((u, i) => `
      <div class="card-cyber" style="margin-bottom:6px; padding:10px 14px; ${u.id === state.user.id ? 'border-color: var(--orange);':''}">
        <div style="display:flex; align-items:center; gap:12px;">

            ${i+1}
          </div>
          <div style="font-size:28px;">${u.avatar}</div>
          <div style="flex:1;">
            <div style="font-weight:700;">${u.name} ${u.id === state.user.id ? '<span style="font-size:11px; color:var(--orange);">(你)</span>':''}</div>
            <div style="font-size:11px; color:rgba(255,255,255,0.5);">Lv ${u.level}</div>
          </div>
          <div class="font-display glow-orange" style="font-size:18px;">
            ${tab==='fat' ? (u[valKey] >= 0 ? '↓' : '↑') : ''}${Math.abs(u[valKey]).toFixed(tab==='fat'?1:0)}${valSuffix}
          </div>
        </div>
      </div>
    `).join('')}
    ${showMe ? `
      <div style="margin-top:12px; padding:8px 0; border-top:1px dashed rgba(255,255,255,0.2);"></div>
      <div class="card-cyber" style="border-color:var(--orange); padding:10px 14px;">
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="font-display" style="font-size:18px; width:36px; text-align:center; color:var(--orange)">#${myIdx+1}</div>
          <div style="font-size:28px;">${state.user.avatar}</div>
          <div style="flex:1;">
            <div style="font-weight:700;">${state.user.name} <span style="font-size:11px; color:var(--orange);">(你)</span></div>
          </div>
          <div class="font-display glow-orange" style="font-size:18px;">
            ${tab==='fat' ? (arr[myIdx][valKey] >= 0 ? '↓' : '↑') : ''}${Math.abs(arr[myIdx][valKey]).toFixed(tab==='fat'?1:0)}${valSuffix}
          </div>
        </div>
      </div>
    ` : ''}
  `;
}

async function handlePhoneSubmit() {
  const phone = $('#login-phone').value.trim();
  if (!phone) return showToast('請輸入電話', 'error');
  sfx.click();
  const existing = await checkPhone(phone);
  if (existing) {
    state.user = existing;
    localStorage.setItem('smr_phone', phone);
    await loadUserData(); await loadTodayQuiz();
    showToast(`👋 歡迎回來 ${existing.name}`);
    state.page = 'home'; render();
  } else {
    state.registerData = { phone };
    state.loginStep = 'register'; render();
  }
}

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div class="font-display glow-orange" style="font-size:20px;">DAY ${day} ${isNew ? '· 新增' : '· 編輯'}</div>
        <button id="ad-q-close" style="background:none; border:none; color:rgba(255,255,255,0.5); font-size:20px; cursor:pointer;">✕</button>
      </div>

      <div style="display:flex; flex-direction:column; gap:10px;">
        <div>
          <label style="font-size:11px; color:var(--blue); font-weight:700;">問題</label>
          <textarea id="q-question" class="input-cyber" rows="2" style="resize:vertical; margin-top:4px;">${data.question}</textarea>
        </div>

        ${['a','b','c','d'].map((k, i) => `

              <input type="radio" name="ans" value="${i}" ${data.answer_index === i ? 'checked' : ''} style="margin-right:4px;"/>
              ${k.toUpperCase()}
            </label>
            <input id="q-opt-${k}" class="input-cyber" value="${data['option_' + k]}" style="flex:1;" />
          </div>

        <div>
          <label style="font-size:11px; color:var(--blue); font-weight:700;">解析（選填）</label>
          <textarea id="q-explain" class="input-cyber" rows="2" style="resize:vertical; margin-top:4px;">${data.explanation || ''}</textarea>
        </div>

        <div style="display:flex; gap:8px; margin-top:6px;">
          <button class="btn-primary" id="q-save" style="flex:1;">${isNew ? '新增題目' : '儲存變更'}</button>
          ${!isNew ? `<button class="btn-cyber" id="q-delete" style="background:linear-gradient(135deg,#ff3d3d,#ff7c2a);">🗑️</button>` : ''}

      option_a: $('#q-opt-a').value.trim(),
      option_b: $('#q-opt-b').value.trim(),
      option_c: $('#q-opt-c').value.trim(),
      option_d: $('#q-opt-d').value.trim(),

      explanation: $('#q-explain').value.trim() || null,
    };
    if (!payload.question || !payload.option_a) return showToast('題目和選項不可空白', 'error');

    if (isNew) {
      const { error } = await sb.from('smr_quiz_questions').insert(payload);
      if (error) return showToast('新增失敗：' + error.message, 'error');
      showToast(`✓ Day ${day} 已新增`);
    } else {
      const { error } = await sb.from('smr_quiz_questions').update(payload).eq('day_number', day);
      if (error) return showToast('儲存失敗：' + error.message, 'error');

function parseQuizMD(text) {
  const blocks = text.split(/\n(?=Day\s+\d+)/i);
  const questions = [];
  for (const block of blocks) {
    const dayMatch = block.match(/Day\s+(\d+)/i);
    const qMatch = block.match(/問題[:：]\s*(.+)/);
    const aMatch = block.match(/^A[.\s]\s*(.+)/m);
    const bMatch = block.match(/^B[.\s]\s*(.+)/m);
    const cMatch = block.match(/^C[.\s]\s*(.+)/m);
    const dMatch = block.match(/^D[.\s]\s*(.+)/m);
    const ansMatch = block.match(/答案[:：]\s*([ABCD])/i);
    const expMatch = block.match(/解析[:：]\s*(.+)/);

    if (dayMatch && qMatch && aMatch && bMatch && cMatch && dMatch && ansMatch) {
      questions.push({
        day_number: parseInt(dayMatch[1]),
        question: qMatch[1].trim(),
        option_a: aMatch[1].trim(),
        option_b: bMatch[1].trim(),
        option_c: cMatch[1].trim(),
        option_d: dMatch[1].trim(),
        answer_index: 'ABCD'.indexOf(ansMatch[1].toUpperCase()),
        explanation: expMatch ? expMatch[1].trim() : null,
      });
    }
  }
  return questions;
}

async function importQuestions(replaceAll) {
  const text = $('#ad-import-text').value;
  const questions = parseQuizMD(text);
  if (questions.length === 0) {
    $('#ad-import-preview').innerHTML = '<div style="color:#ff3d3d;">❌ 解析失敗：無法找到任何題目，請檢查格式</div>';
    return;
  }
  if (!confirm(`成功解析 ${questions.length} 題，${replaceAll ? '覆蓋現有所有題目' : '存在的題目會被更新'}，繼續嗎？`)) return;

  if (replaceAll) {
    await sb.from('smr_quiz_questions').delete().neq('day_number', -1);
  }

  // upsert
  const { error } = await sb.from('smr_quiz_questions').upsert(questions, { onConflict: 'day_number' });
  if (error) {
    $('#ad-import-preview').innerHTML = `<div style="color:#ff3d3d;">❌ 寫入失敗：${error.message}</div>`;
    return;
  }
  $('#ad-import-preview').innerHTML = `<div style="color:#4caf50;">✓ 成功匯入 ${questions.length} 題</div>`;
  showToast(`✓ 匯入 ${questions.length} 題完成`);
  await loadQuizGrid();
}

function exportQuizMD() {
  if (allQuestions.length === 0) return showToast('題庫為空', 'error');
  const md = allQuestions.sort((a,b) => a.day_number - b.day_number).map(q => {
    const ans = ['A','B','C','D'][q.answer_index];
    return `Day ${q.day_number}\n問題：${q.question}\nA. ${q.option_a}\nB. ${q.option_b}\nC. ${q.option_c}\nD. ${q.option_d}\n答案：${ans}${q.explanation ? '\n解析：' + q.explanation : ''}`;
  }).join('\n\n');

  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `smr_quiz_export_${new Date().toISOString().split('T')[0]}.md`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`✓ 已匯出 ${allQuestions.length} 題`);
}

// ============ EVENT LISTENERS ============
function attachListeners() {
  $$('[data-nav]').forEach(el => el.onclick = () => { sfx.click(); state.page = el.dataset.nav; render(); });
  $$('[data-action="quiz"]').forEach(el => el.onclick = () => { sfx.click(); state.quizState = null; state.page = 'quiz'; render(); });
  $$('[data-action="claim-badge"]').forEach(el => el.onclick = () => claimBadge());
  $$('[data-meal]').forEach(el => el.onclick = () => checkIn(el.dataset.meal));
  $$('[data-quiz-opt]').forEach(el => el.onclick = () => submitQuiz(parseInt(el.dataset.quizOpt)));
  $$('[data-tab]').forEach(el => el.onclick = () => {
    state.rankTab = el.dataset.tab; sfx.click(); render();
  });
  $$('[data-rtab]').forEach(el => el.onclick = () => { state.recordTab = el.dataset.rtab; sfx.click(); render(); });

  if (state.page === 'rank') renderRankContent();

  // Lunch photo upload
  const lunchBtn = $('#lunch-upload-btn');
  const lunchInput = $('#lunch-photo');
  if (lunchBtn && lunchInput) {
    let lunchBase64 = null;
    lunchBtn.onclick = () => lunchInput.click();
    lunchInput.onchange = async (e) => {
      const f = e.target.files[0]; if (!f) return;
      try {
        showToast('壓縮圖片中...');
        lunchBase64 = await fileToCompressedBase64(f, 1000, 0.7);
        $('#lunch-preview').innerHTML = `
          <img src="${lunchBase64}" style="width:100%; max-height:200px; object-fit:cover; border-radius:12px; border:2px solid var(--blue); margin-top:10px;" />
          <button class="btn-primary" id="lunch-confirm" style="width:100%; margin-top:10px;">✓ 確認打卡</button>
        `;
        $('#lunch-confirm').onclick = () => checkIn('lunch', lunchBase64);
      } catch { showToast('圖片處理失敗', 'error'); }
    };
  }

  if (state.page === 'body') {
    const f = $('#body-form');
    let facePhoto = null, tonguePhoto = null;

    const faceInput = $('#face-photo');
    const tongueInput = $('#tongue-photo');
    if (faceInput) {
      faceInput.onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        facePhoto = await fileToCompressedBase64(file);
        $('#face-preview').innerHTML = `<img src="${facePhoto}" style="width:80px; height:80px; object-fit:cover; border-radius:8px; margin-top:6px; border:2px solid var(--blue);" />`;
      };
    }
    if (tongueInput) {
      tongueInput.onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        tonguePhoto = await fileToCompressedBase64(file);
        $('#tongue-preview').innerHTML = `<img src="${tonguePhoto}" style="width:80px; height:80px; object-fit:cover; border-radius:8px; margin-top:6px; border:2px solid var(--blue);" />`;
      };
    }

    if (f) f.onsubmit = (e) => {
      e.preventDefault();
      const fd = new FormData(f);
      submitBodyRecord(Object.fromEntries(fd));
    };

    const aiBtn = $('#ai-submit');
    if (aiBtn) aiBtn.onclick = () => {
      const fd = new FormData(f);
      const data = Object.fromEntries(fd);
      if (!data.weight || !data.body_fat || !data.muscle || !data.visceral) return showToast('請完整填寫身體數據', 'error');
      if (!facePhoto || !tonguePhoto) return showToast('請上傳面部與舌診照片', 'error');
      runFullAIAnalysis(data, facePhoto, tonguePhoto);
    };

    // existing user clicked the "立即使用 AI 分析" button (no form, no data yet)
    $$('[data-nav-ai]').forEach(el => el.onclick = () => {
      // delete today record so user can re-input with AI
      sb.from('smr_body_records').delete().eq('user_id', state.user.id).eq('recorded_date', today()).then(() => {
        state.bodyRecords = state.bodyRecords.filter(r => r.recorded_date !== today());
        render();
      });
    });
  }
}

// ============ PWA Install Prompt ============
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // 已登入後 3 秒顯示提示
  setTimeout(() => {
    if (!localStorage.getItem('smr_install_dismissed') && state.page !== 'login') showInstallBanner();
  }, 3000);
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const div = document.createElement('div');
  div.id = 'install-banner';
  div.style.cssText = `
    position:fixed; bottom:80px; left:12px; right:12px; max-width:456px; margin:0 auto; z-index:90;
    background:linear-gradient(135deg, var(--orange), var(--pink));
    border-radius:16px; padding:14px 16px;
    box-shadow:0 8px 32px rgba(255,124,42,0.5);
    display:flex; align-items:center; gap:12px;
    animation:slide-up 0.4s ease;
  `;
  div.innerHTML = `
    <div style="font-size:32px;">📲</div>
    <div style="flex:1;">
      <div style="font-weight:900; font-size:14px;">加到主畫面更好用</div>
      <div style="font-size:11px; opacity:0.9; margin-top:2px;">像 App 一樣開啟，不會誤關</div>
    </div>
    <button id="install-yes" style="background:rgba(255,255,255,0.25); border:none; color:#fff; padding:8px 14px; border-radius:20px; font-weight:700; cursor:pointer; font-family:inherit; font-size:13px;">安裝</button>
    <button id="install-no" style="background:none; border:none; color:rgba(255,255,255,0.6); cursor:pointer; font-size:18px;">✕</button>
  `;
  document.body.appendChild(div);
  document.getElementById('install-yes').onclick = async () => {
    if (deferredInstallPrompt) {
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
    }
    div.remove();
  };
  document.getElementById('install-no').onclick = () => {
    localStorage.setItem('smr_install_dismissed', '1');
    div.remove();
  };
}

// iOS 提示（Safari 不支援 beforeinstallprompt）
function showIOSInstallTip() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('smr_ios_dismissed')) {
    setTimeout(() => {
      if (state.page === 'login' || document.getElementById('install-banner')) return;
      const div = document.createElement('div');
      div.style.cssText = `position:fixed; bottom:80px; left:12px; right:12px; max-width:456px; margin:0 auto; z-index:90;
        background:linear-gradient(135deg, var(--orange), var(--pink)); border-radius:16px; padding:14px 16px;
        display:flex; gap:10px; box-shadow:0 8px 32px rgba(255,124,42,0.5);`;
      div.innerHTML = `<div style="font-size:28px;">📲</div>
        <div style="flex:1; font-size:12px; line-height:1.5;">
          <b>加到主畫面：</b>點底部 <span style="font-size:16px;">⎘</span> → 「加入主畫面」
        </div>
        <button id="ios-no" style="background:none; border:none; color:#fff; cursor:pointer;">✕</button>`;
      document.body.appendChild(div);
      document.getElementById('ios-no').onclick = () => { localStorage.setItem('smr_ios_dismissed', '1'); div.remove(); };
    }, 5000);
  }
}
