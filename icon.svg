<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a4a"/>
      <stop offset="100%" stop-color="#0a0a1e"/>
    </linearGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7c2a"/>
      <stop offset="50%" stop-color="#ff3d9a"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#ff7c2a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff7c2a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 光暈背景 -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- 啞鈴 -->
  <g transform="translate(256, 256)" stroke="url(#logo)" stroke-width="14" fill="none" stroke-linecap="round">
    <rect x="-110" y="-32" width="40" height="64" rx="8" fill="url(#logo)"/>
    <rect x="-72" y="-12" width="144" height="24" rx="4" fill="url(#logo)"/>
    <rect x="70" y="-32" width="40" height="64" rx="8" fill="url(#logo)"/>
    <rect x="-130" y="-22" width="22" height="44" rx="4" fill="url(#logo)"/>
    <rect x="108" y="-22" width="22" height="44" rx="4" fill="url(#logo)"/>
  </g>

  <!-- 文字 -->
  <text x="256" y="420" font-family="Arial Black, sans-serif" font-size="58" font-weight="900" text-anchor="middle" fill="url(#logo)" letter-spacing="4">SUPER</text>
</svg>
